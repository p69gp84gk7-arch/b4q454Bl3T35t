<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trace & Surfaces AR iPhone</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #ui-layer { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .upload-btn { background-color: rgba(255, 255, 255, 0.9); color: #007aff; padding: 12px 24px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        #file-input { display: none; }
        #status-message { position: absolute; top: 20px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 1000; font-size: 16px; padding: 0 10px; box-sizing: border-box; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script>
        // Ce composant dessine un polygone plat 3D à partir de coordonnées GPS brutes
        AFRAME.registerComponent('kml-polygon', {
            schema: {
                points: {type: 'string', default: ''},
                color: {type: 'color', default: '#3498db'},
                opacity: {type: 'number', default: 0.4}
            },
            init: function() {
                const pointsArr = this.data.points.trim().split(/\s+/);
                if (pointsArr.length < 3) return; // Un polygone nécessite au moins 3 points

                // Le point d'ancrage est le premier point
                const pt0 = pointsArr[0].split(',');
                const lon0 = parseFloat(pt0[0]);
                const lat0 = parseFloat(pt0[1]);

                // Création de la forme 2D
                const shape = new THREE.Shape();
                shape.moveTo(0, 0); // L'origine locale

                // Calcul de la position locale (X, Z) des autres points par rapport au point d'ancrage
                for(let i = 1; i < pointsArr.length; i++) {
                    const pt = pointsArr[i].split(',');
                    if (pt.length >= 2) {
                        const lon = parseFloat(pt[0]);
                        const lat = parseFloat(pt[1]);
                        
                        const dist = calculateDistance(lat0, lon0, lat, lon);
                        const bearing = calculateBearing(lat0, lon0, lat, lon);
                        
                        // Conversion Polaire vers Cartésien (Z est négatif vers le Nord en 3D)
                        const x = dist * Math.sin(bearing);
                        const z = -dist * Math.cos(bearing); 
                        
                        shape.lineTo(x, z);
                    }
                }

                // Extrusion de la forme en géométrie plane
                const geometry = new THREE.ShapeGeometry(shape);
                geometry.rotateX(-Math.PI / 2); // On couche le polygone à l'horizontale

                const material = new THREE.MeshBasicMaterial({
                    color: this.data.color,
                    transparent: true,
                    opacity: this.data.opacity,
                    side: THREE.DoubleSide,
                    depthWrite: false // Améliore le rendu des surfaces transparentes qui se chevauchent
                });

                const mesh = new THREE.Mesh(geometry, material);
                // On place la surface 1.5 mètres sous la caméra (pour simuler le sol)
                mesh.position.y = -1.5; 
                
                this.el.setObject3D('mesh', mesh);
            }
        });

        // Outils Mathématiques globaux pour les distances et les angles (Azimut)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const phi1 = lat1 * toRad, phi2 = lat2 * toRad;
            const lam1 = lon1 * toRad, lam2 = lon2 * toRad;
            const y = Math.sin(lam2 - lam1) * Math.cos(phi2);
            const x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lam2 - lam1);
            return Math.atan2(y, x); // Retourne l'angle en radians
        }
    </script>
</head>
<body>

    <div id="status-message">📍 Autorisez la caméra, puis chargez un fichier</div>
    <div id="ui-layer">
        <label for="file-input" class="upload-btn">Ouvrir KML/KMZ</label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-camera gps-projected-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const statusEl = document.getElementById('status-message');
        const sceneEl = document.querySelector('a-scene');

        // --- BLOC 6 : DIAGNOSTIC DU SERVICE DE LOCALISATION ---
        window.addEventListener('load', () => {
            if (!("geolocation" in navigator)) { statusEl.innerText = "❌ GPS non supporté."; return; }
            navigator.geolocation.getCurrentPosition(
                () => { statusEl.innerText = "📍 GPS Actif. Chargez un fichier."; statusEl.style.color = "#4ade80"; },
                (e) => { statusEl.style.color = "#ff4d4f"; statusEl.innerText = "❌ ERREUR GPS : Activez la localisation de Safari !"; },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });

        // --- GESTIONNAIRE D'UPLOAD DE FICHIER ---
        document.getElementById('file-input').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusEl.innerText = "Traitement en cours...";
            statusEl.style.color = "white"; 

            // Nettoyage de la scène avant de charger un nouveau fichier
            document.querySelectorAll('.kml-element').forEach(el => el.parentNode.removeChild(el));

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = new JSZip();
                    const contents = await zip.loadAsync(file);
                    const kmlFilename = Object.keys(contents.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML dans le KMZ.");
                    kmlText = await contents.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }
                
                processKMLData(kmlText);

            } catch (error) {
                console.error(error);
                statusEl.style.color = "#ff4d4f";
                statusEl.innerText = "🚨 ERREUR : " + error.message;
            }
        });

        // --- PARSEUR INTELLIGENT KML (Points, Lignes, Surfaces) ---
        function processKMLData(kmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlString, "text/xml");
            
            let firstLat = null, firstLon = null;
            let stats = { canons: 0, jalons: 0, surfaces: 0 };

            // 1. EXTRACTION DES SURFACES (<Polygon>)
            const polygons = xmlDoc.getElementsByTagName("Polygon");
            for (let i = 0; i < polygons.length; i++) {
                const coordsTags = polygons[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const text = coordsTags[0].textContent.trim();
                    const firstPt = text.split(/\s+/)[0].split(',');
                    if (firstPt.length >= 2) {
                        const lon = parseFloat(firstPt[0]);
                        const lat = parseFloat(firstPt[1]);
                        if (firstLat === null) { firstLat = lat; firstLon = lon; }

                        const surfaceEl = document.createElement('a-entity');
                        surfaceEl.setAttribute('class', 'kml-element'); // Pour pouvoir les effacer
                        surfaceEl.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        // Utilise notre nouveau composant (Couleur bleue semi-transparente)
                        surfaceEl.setAttribute('kml-polygon', `points: ${text}; color: #3498db; opacity: 0.5`);
                        
                        sceneEl.appendChild(surfaceEl);
                        stats.surfaces++;
                    }
                }
            }

            // 2. EXTRACTION DES TRACES (<LineString>)
            const lines = xmlDoc.getElementsByTagName("LineString");
            for (let i = 0; i < lines.length; i++) {
                const coordsTags = lines[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const points = coordsTags[0].textContent.trim().split(/\s+/);
                    const step = Math.max(1, Math.floor(points.length / 100)); // Allège l'affichage
                    
                    for (let j = 0; j < points.length; j += step) {
                        const coords = points[j].split(',');
                        if (coords.length >= 2) {
                            const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                            if (firstLat === null) { firstLat = lat; firstLon = lon; }

                            const jalon = document.createElement('a-sphere');
                            jalon.setAttribute('class', 'kml-element');
                            jalon.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                            jalon.setAttribute('radius', '1.5'); 
                            jalon.setAttribute('color', '#FF3B30'); // Rouge
                            jalon.setAttribute('opacity', '0.7');
                            
                            sceneEl.appendChild(jalon);
                            stats.jalons++;
                        }
                    }
                }
            }

            // 3. EXTRACTION DES CANONS/POINTS (<Point>)
            const points = xmlDoc.getElementsByTagName("Point");
            for (let i = 0; i < points.length; i++) {
                const coordsTags = points[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const coords = coordsTags[0].textContent.trim().split(',');
                    if (coords.length >= 2) {
                        const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                        if (firstLat === null) { firstLat = lat; firstLon = lon; }

                        stats.canons++;

                        const pointGroup = document.createElement('a-entity');
                        pointGroup.setAttribute('class', 'kml-element');
                        pointGroup.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                        // La balise sphérique (Jaune pour la différencier de la trace)
                        const sphere = document.createElement('a-sphere');
                        sphere.setAttribute('radius', '2.5');
                        sphere.setAttribute('color', '#FFCC00'); 
                        pointGroup.appendChild(sphere);

                        // L'étiquette de texte
                        const etiquette = document.createElement('a-text');
                        etiquette.setAttribute('value', `Canon ${stats.canons}`);
                        etiquette.setAttribute('look-at', '[gps-projected-camera]'); 
                        etiquette.setAttribute('scale', '15 15 15'); 
                        etiquette.setAttribute('position', '0 5 0'); 
                        etiquette.setAttribute('align', 'center');
                        etiquette.setAttribute('color', '#FFFFFF');
                        etiquette.setAttribute('geometry', 'primitive: plane; height: auto; width: auto');
                        etiquette.setAttribute('material', 'color: #000000; opacity: 0.6');
                        pointGroup.appendChild(etiquette);

                        sceneEl.appendChild(pointGroup);
                    }
                }
            }

            // --- VÉRIFICATION DE DISTANCE ---
            if (firstLat !== null && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, firstLat, firstLon);
                        const distTxt = dist > 1000 ? (dist/1000).toFixed(1) + " km" : Math.round(dist) + " m";
                        statusEl.innerText = `${stats.canons} Canons, ${stats.surfaces} Surfaces. À ${distTxt} de vous.`;
                        if (dist > 5000) statusEl.style.color = "#FFcc00"; // Avertissement si trop loin
                    },
                    (err) => { statusEl.innerText = `${stats.canons} Canons, ${stats.surfaces} Surfaces chargés.`; },
                    { enableHighAccuracy: true }
                );
            } else {
                statusEl.innerText = `Éléments trouvés : ${stats.canons} canons, ${stats.surfaces} surfaces.`;
            }
        }
    </script>
</body>
</html>
