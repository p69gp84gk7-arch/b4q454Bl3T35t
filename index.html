<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualiseur KML/KMZ en AR</title>
    
    <style>
        /* Réinitialisation de base */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; /* Fond noir en attendant la caméra */
        }

        /* L'interface utilisateur superposée à la caméra */
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1000; /* Toujours au-dessus de la 3D/Caméra */
        }

        /* Style du bouton d'upload façon iOS */
        .upload-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #007aff;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Cacher l'input fichier natif très moche */
        #file-input {
            display: none;
        }

        #status-message {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="status-message">En attente d'un fichier...</div>

    <div id="ui-layer">
        <label for="file-input" class="upload-btn">
            Charger une trace (KML/KMZ)
        </label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <script>
        // Logique de base pour écouter l'upload
        document.getElementById('file-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('status-message').innerText = "Fichier sélectionné : " + file.name;
                // C'est ici que nous intégrerons la logique du Bloc 3 plus tard
                console.log("Fichier prêt à être traité :", file);
            }
        });
    </script>
</body>
</html>
