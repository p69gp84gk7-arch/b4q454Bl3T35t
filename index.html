<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trace & Surfaces AR iPhone (Avec Altitude)</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #ui-layer { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .upload-btn { background-color: rgba(255, 255, 255, 0.9); color: #007aff; padding: 12px 24px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        #file-input { display: none; }
        #status-message { position: absolute; top: 20px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 1000; font-size: 16px; padding: 0 10px; box-sizing: border-box; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script>
        // Composant Surface mis à jour pour accepter une altitude de base
        AFRAME.registerComponent('kml-polygon', {
            schema: { points: {type: 'string', default: ''}, color: {type: 'color', default: '#3498db'}, opacity: {type: 'number', default: 0.4}, relativeAlt: {type: 'number', default: 0} },
            init: function() {
                const pointsArr = this.data.points.trim().split(/\s+/);
                if (pointsArr.length < 3) return;

                const pt0 = pointsArr[0].split(',');
                const lon0 = parseFloat(pt0[0]), lat0 = parseFloat(pt0[1]);
                if(isNaN(lon0) || isNaN(lat0)) return; 

                const shape = new THREE.Shape();
                shape.moveTo(0, 0);

                for(let i = 1; i < pointsArr.length; i++) {
                    const pt = pointsArr[i].split(',');
                    if (pt.length >= 2) {
                        const lon = parseFloat(pt[0]), lat = parseFloat(pt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        
                        const dist = calculateDistance(lat0, lon0, lat, lon);
                        const bearing = calculateBearing(lat0, lon0, lat, lon);
                        
                        const x = dist * Math.sin(bearing);
                        const z = -dist * Math.cos(bearing); 
                        shape.lineTo(x, z);
                    }
                }

                const geometry = new THREE.ShapeGeometry(shape);
                geometry.rotateX(-Math.PI / 2);
                const material = new THREE.MeshBasicMaterial({ color: this.data.color, transparent: true, opacity: this.data.opacity, side: THREE.DoubleSide, depthWrite: false });
                const mesh = new THREE.Mesh(geometry, material);
                
                // On applique l'altitude relative de la surface (avec -1.5m pour simuler qu'elle est au sol par rapport à nos yeux)
                mesh.position.y = this.data.relativeAlt - 1.5; 
                this.el.setObject3D('mesh', mesh);
            }
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180, phi1 = lat1 * toRad, phi2 = lat2 * toRad, lam1 = lon1 * toRad, lam2 = lon2 * toRad;
            const y = Math.sin(lam2 - lam1) * Math.cos(phi2), x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lam2 - lam1);
            return Math.atan2(y, x); 
        }
    </script>
</head>
<body>

    <div id="status-message">📍 Autorisez la caméra, puis chargez un fichier</div>
    <div id="ui-layer">
        <label for="file-input" class="upload-btn">Ouvrir KML/KMZ</label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-camera gps-camera="minDistance: 1; maxDistance: 3000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const statusEl = document.getElementById('status-message');
        const sceneEl = document.querySelector('a-scene');

        // Variables globales pour stocker la position du joueur
        let playerLat = null;
        let playerLon = null;
        let playerAlt = null; // Altitude de l'iPhone

        window.addEventListener('load', () => {
            if (!("geolocation" in navigator)) { statusEl.innerText = "❌ GPS non supporté."; return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => { 
                    playerLat = pos.coords.latitude;
                    playerLon = pos.coords.longitude;
                    // L'altitude peut être null si le capteur ne la trouve pas
                    playerAlt = pos.coords.altitude || 0; 
                    
                    statusEl.innerText = `📍 GPS Actif (Alt: ${Math.round(playerAlt)}m). Chargez un fichier.`; 
                    statusEl.style.color = "#4ade80"; 
                },
                (e) => { statusEl.style.color = "#ff4d4f"; statusEl.innerText = "❌ ERREUR GPS : Activez la localisation !"; },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });

        // --- NOUVEAU FLUX D'UPLOAD ---
        document.getElementById('file-input').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusEl.innerText = "Extraction du fichier...";
            statusEl.style.color = "white"; 
            document.querySelectorAll('.kml-element').forEach(el => el.parentNode.removeChild(el));

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = new JSZip();
                    const contents = await zip.loadAsync(file);
                    const kmlFilename = Object.keys(contents.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML dans le KMZ.");
                    kmlText = await contents.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }
                
                // BLOC 10 : Si on a le fichier, on refait un point GPS précis pour avoir l'altitude la plus fraîche avant de dessiner
                statusEl.innerText = "Recalibrage de l'altitude...";
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        playerLat = pos.coords.latitude;
                        playerLon = pos.coords.longitude;
                        playerAlt = pos.coords.altitude || 0;
                        processKMLData(kmlText);
                    },
                    (err) => {
                        // Si le GPS échoue à l'instant T, on utilise les anciennes valeurs et on dessine quand même
                        processKMLData(kmlText);
                    },
                    { enableHighAccuracy: true }
                );

            } catch (error) {
                statusEl.style.color = "#ff4d4f";
                statusEl.innerText = "🚨 ERREUR : " + error.message;
            }
        });

        // Fonctionnalité utilitaire pour calculer le décalage de hauteur (Bloc 10)
        function getRelativeAltitude(coordsArray) {
            if (coordsArray.length >= 3 && playerAlt !== null) {
                const pointAlt = parseFloat(coordsArray[2]);
                if (!isNaN(pointAlt)) {
                    // Limite de sécurité : si la différence est de plus de 1000m, c'est sûrement un bug GPS, on limite.
                    let delta = pointAlt - playerAlt;
                    if (delta > 1000) delta = 1000;
                    if (delta < -1000) delta = -1000;
                    return delta;
                }
            }
            return 0; // Si pas d'altitude dans le KML, on met au niveau des yeux
        }

        function processKMLData(kmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlString, "text/xml");
            
            let firstLat = null, firstLon = null;
            let stats = { canons: 0, jalons: 0, surfaces: 0 };

            // 1. SURFACES
            const polygons = xmlDoc.getElementsByTagName("Polygon");
            for (let i = 0; i < polygons.length; i++) {
                const coordsTags = polygons[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const text = coordsTags[0].textContent.trim();
                    const firstPt = text.split(/\s+/)[0].split(',');
                    if (firstPt.length >= 2) {
                        const lon = parseFloat(firstPt[0]), lat = parseFloat(firstPt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        if (firstLat === null) { firstLat = lat; firstLon = lon; }

                        const relAlt = getRelativeAltitude(firstPt);

                        const surfaceEl = document.createElement('a-entity');
                        surfaceEl.setAttribute('class', 'kml-element');
                        surfaceEl.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        // On passe la nouvelle altitude relative au composant
                        surfaceEl.setAttribute('kml-polygon', `points: ${text}; color: #3498db; opacity: 0.5; relativeAlt: ${relAlt}`);
                        sceneEl.appendChild(surfaceEl);
                        stats.surfaces++;
                    }
                }
            }

            // 2. TRACES (Jalons)
            const lines = xmlDoc.getElementsByTagName("LineString");
            for (let i = 0; i < lines.length; i++) {
                const coordsTags = lines[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const points = coordsTags[0].textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                    const step = Math.max(1, Math.floor(points.length / 100)); 
                    
                    for (let j = 0; j < points.length; j += step) {
                        const coords = points[j].split(',');
                        if (coords.length >= 2) {
                            const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                            if(isNaN(lon) || isNaN(lat)) continue; 
                            if (firstLat === null) { firstLat = lat; firstLon = lon; }

                            const relAlt = getRelativeAltitude(coords);

                            // L'ancre GPS (X, Z)
                            const anchor = document.createElement('a-entity');
                            anchor.setAttribute('class', 'kml-element');
                            anchor.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                            // Le jalon en lui-même (décalé en Y)
                            const jalon = document.createElement('a-sphere');
                            jalon.setAttribute('position', `0 ${relAlt} 0`);
                            jalon.setAttribute('radius', '1.5'); 
                            jalon.setAttribute('color', '#FF3B30'); 
                            jalon.setAttribute('opacity', '0.7');
                            
                            anchor.appendChild(jalon);
                            sceneEl.appendChild(anchor);
                            stats.jalons++;
                        }
                    }
                }
            }

            // 3. CANONS (Points)
            const points = xmlDoc.getElementsByTagName("Point");
            for (let i = 0; i < points.length; i++) {
                const coordsTags = points[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const coords = coordsTags[0].textContent.trim().split(',');
                    if (coords.length >= 2) {
                        const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        if (firstLat === null) { firstLat = lat; firstLon = lon; }

                        const relAlt = getRelativeAltitude(coords);
                        stats.canons++;

                        // L'ancre GPS
                        const pointGroup = document.createElement('a-entity');
                        pointGroup.setAttribute('class', 'kml-element');
                        pointGroup.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                        // Le conteneur de hauteur (Altitude)
                        const heightContainer = document.createElement('a-entity');
                        heightContainer.setAttribute('position', `0 ${relAlt} 0`);

                        const sphere = document.createElement('a-sphere');
                        sphere.setAttribute('radius', '2.5');
                        sphere.setAttribute('color', '#FFCC00'); 
                        heightContainer.appendChild(sphere);

                        const etiquette = document.createElement('a-text');
                        etiquette.setAttribute('value', `Canon ${stats.canons}`);
                        etiquette.setAttribute('look-at', '[gps-camera]'); 
                        etiquette.setAttribute('scale', '10 10 10'); 
                        etiquette.setAttribute('position', '0 5 0'); 
                        etiquette.setAttribute('align', 'center');
                        etiquette.setAttribute('color', '#FFFFFF');
                        etiquette.setAttribute('geometry', 'primitive: plane; height: auto; width: auto');
                        etiquette.setAttribute('material', 'color: #000000; opacity: 0.6');
                        heightContainer.appendChild(etiquette);

                        // On assemble les blocs
                        pointGroup.appendChild(heightContainer);
                        sceneEl.appendChild(pointGroup);
                    }
                }
            }

            if (firstLat !== null && playerLat !== null) {
                const dist = calculateDistance(playerLat, playerLon, firstLat, firstLon);
                const distTxt = dist > 1000 ? (dist/1000).toFixed(1) + " km" : Math.round(dist) + " m";
                statusEl.innerText = `${stats.canons} Canons. À ${distTxt} de vous. (Alt KML prise en compte)`;
            } else {
                statusEl.innerText = `Éléments : ${stats.canons} canons, ${stats.surfaces} surfaces.`;
            }
        }
    </script>
</body>
</html>
