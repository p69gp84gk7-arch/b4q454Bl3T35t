<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur Topographique KML / MNT (Export)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; font-family: -apple-system, sans-serif; }
        
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; height: 100%; background: #000; cursor: crosshair; }
        
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-bottom: 5px;}
        
        .file-box { background: #34495e; padding: 15px; border-radius: 8px; border: 1px dashed #7f8c8d; transition: 0.3s; }
        .file-box.active { border-color: #4ade80; background: #27ae60; }
        .file-box.error { border-color: #e74c3c; background: #c0392b; }
        .file-box label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; cursor: pointer;}
        input[type="file"] { width: 100%; color: #bdc3c7; font-size: 12px; }
        
        .action-btn { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .action-btn:hover { background: #2980b9; }
        .action-btn:active { transform: scale(0.98); }
        
        /* Style spécifique pour le bouton de téléchargement final */
        .download-btn { background: #e67e22; }
        .download-btn:hover { background: #d35400; }

        #log-panel { background: #1a252f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; color: #4ade80; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.4;}
        
        .disabled-step { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Atelier Topographique</h2>
        
        <div class="file-box" id="box-kmz">
            <label for="kmz-input">1. Charger la trace (KML/KMZ)</label>
            <input type="file" id="kmz-input" accept=".kml,.kmz">
        </div>
        
        <div class="file-box" id="box-tif">
            <label for="tif-input">2. Charger le MNT (.tif)</label>
            <input type="file" id="tif-input" accept=".tif,.tiff">
            <div style="font-size: 11px; margin-top:5px; color:#bdc3c7;">(Supporte Lambert 93)</div>
        </div>

        <div class="file-box disabled-step" id="box-process">
            <label>3. Traitement Mathématique</label>
            <button id="btn-process" class="action-btn">Mettre à jour les Altitudes</button>
            <div style="font-size: 11px; margin-top:5px; color:#bdc3c7;">Croise le KMZ avec le MNT</div>
        </div>

        <div class="file-box disabled-step" id="box-export">
            <label>4. Sauvegarde</label>
            <button id="btn-export" class="action-btn download-btn">Télécharger le KML 3D</button>
            <div style="font-size: 11px; margin-top:5px; color:#bdc3c7;">Fichier prêt pour la Réalité Augmentée</div>
        </div>

        <div id="log-panel">Système initialisé. Attente des données...</div>
    </div>

    <div id="map"></div>

    <script>
        const logPanel = document.getElementById('log-panel');
        function log(msg) { logPanel.innerText += `\n> ${msg}`; logPanel.scrollTop = logPanel.scrollHeight; }

        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        const map = L.map('map').setView([46.6, 2.2], 6);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);

        const kmlLayerGroup = L.featureGroup().addTo(map);
        let mntBoundsLayer = null; 

        // --- ÉTATS GLOBAUX ---
        let isKmzLoaded = false;
        let isMntLoaded = false;
        let kmlXmlDoc = null; 
        let kmlFileName = "trace_modifiee.kml"; 

        let mntData = null; 
        let mntWidth = 0, mntHeight = 0;
        let mntBbox = null; 
        let isLambert93 = false;

        function checkReadyStatus() {
            if (isKmzLoaded && isMntLoaded) {
                document.getElementById('box-process').classList.remove('disabled-step');
                log("🟢 Prêt pour la fusion 3D ! Cliquez sur l'étape 3.");
            }
        }

        // --- ÉTAPE 1 : LECTURE DU KMZ ---
        document.getElementById('kmz-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            log(`Chargement KML/KMZ : ${file.name}...`);
            const boxKmz = document.getElementById('box-kmz');
            boxKmz.classList.remove('error');
            boxKmz.classList.add('active');
            kmlLayerGroup.clearLayers();

            // On mémorise le nom pour le futur export, en forçant l'extension .kml
            let baseName = file.name;
            if (baseName.toLowerCase().endsWith('.kmz')) baseName = baseName.slice(0, -4);
            if (baseName.toLowerCase().endsWith('.kml')) baseName = baseName.slice(0, -4);
            kmlFileName = baseName + "_Relief_3D.kml";

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    const kmlFilename = Object.keys(zip.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML trouvé.");
                    kmlText = await zip.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }

                const parser = new DOMParser();
                kmlXmlDoc = parser.parseFromString(kmlText, "text/xml"); 
                
                let stats = { points: 0, lines: 0, polygons: 0 };
                const bounds = L.latLngBounds();

                // Dessin visuel sur la carte 2D
                const polygons = kmlXmlDoc.getElementsByTagName("Polygon");
                for (let p of polygons) {
                    const coordsNode = p.getElementsByTagName("coordinates")[0];
                    if (coordsNode) {
                        const coords = coordsNode.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                        const latLngs = [];
                        coords.forEach(c => {
                            const pts = c.split(',');
                            if (pts.length >= 2) { 
                                const lat = parseFloat(pts[1]), lon = parseFloat(pts[0]);
                                if(Math.abs(lat) <= 90 && Math.abs(lon) <= 180) { latLngs.push([lat, lon]); bounds.extend([lat, lon]); }
                            }
                        });
                        if (latLngs.length > 0) { L.polygon(latLngs, {color: '#3498db', weight: 2, fillOpacity: 0.4}).addTo(kmlLayerGroup); stats.polygons++; }
                    }
                }

                const lines = kmlXmlDoc.getElementsByTagName("LineString");
                for (let l of lines) {
                    const coordsNode = l.getElementsByTagName("coordinates")[0];
                    if (coordsNode) {
                        const coords = coordsNode.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                        const latLngs = [];
                        coords.forEach(c => {
                            const pts = c.split(',');
                            if (pts.length >= 2) { 
                                const lat = parseFloat(pts[1]), lon = parseFloat(pts[0]);
                                if(Math.abs(lat) <= 90 && Math.abs(lon) <= 180) { latLngs.push([lat, lon]); bounds.extend([lat, lon]); }
                            }
                        });
                        if (latLngs.length > 0) { L.polyline(latLngs, {color: '#FF3B30', weight: 4}).addTo(kmlLayerGroup); stats.lines++; }
                    }
                }

                const placemarks = kmlXmlDoc.getElementsByTagName("Placemark");
                for (let pm of placemarks) {
                    const ptNode = pm.getElementsByTagName("Point")[0];
                    if (ptNode) {
                        const coordsNode = ptNode.getElementsByTagName("coordinates")[0];
                        if (coordsNode) {
                            const pts = coordsNode.textContent.trim().split(',');
                            if (pts.length >= 2) {
                                const lat = parseFloat(pts[1]), lon = parseFloat(pts[0]);
                                if(Math.abs(lat) <= 90 && Math.abs(lon) <= 180) {
                                    L.circleMarker([lat, lon], { radius: 6, fillColor: '#FFCC00', color: '#000', weight: 1, fillOpacity: 1 }).addTo(kmlLayerGroup);
                                    bounds.extend([lat, lon]);
                                    stats.points++;
                                }
                            }
                        }
                    }
                }

                log(`Trace chargée : ${stats.points} Pts, ${stats.lines} Lignes, ${stats.polygons} Zones.`);
                if (bounds.isValid() && !mntData) map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 }); 

                isKmzLoaded = true;
                checkReadyStatus();

            } catch (error) {
                log(`❌ ERREUR KMZ: ${error.message}`);
                boxKmz.classList.remove('active');
                boxKmz.classList.add('error');
                isKmzLoaded = false;
            }
        });

        // --- ÉTAPE 2 : LECTURE DU MNT ---
        document.getElementById('tif-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            log(`Analyse du MNT : ${file.name}...`);
            const boxTif = document.getElementById('box-tif');
            boxTif.classList.remove('error');
            boxTif.classList.add('active');

            try {
                const arrayBuffer = await file.arrayBuffer();
                const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                const image = await tiff.getImage();
                
                mntBbox = image.getBoundingBox();
                mntWidth = image.getWidth();
                mntHeight = image.getHeight();
                
                if (Math.abs(mntBbox[0]) > 180) {
                    isLambert93 = true;
                    const swWgs84 = proj4("EPSG:2154", "EPSG:4326", [mntBbox[0], mntBbox[1]]);
                    const neWgs84 = proj4("EPSG:2154", "EPSG:4326", [mntBbox[2], mntBbox[3]]);
                    var boundsWgs84 = [[swWgs84[1], swWgs84[0]], [neWgs84[1], neWgs84[0]]]; 
                } else {
                    isLambert93 = false;
                    var boundsWgs84 = [[mntBbox[1], mntBbox[0]], [mntBbox[3], mntBbox[2]]];
                }

                const rasters = await image.readRasters();
                mntData = rasters[0]; 

                log(`✅ MNT prêt en mémoire.`);

                if (mntBoundsLayer) map.removeLayer(mntBoundsLayer);
                mntBoundsLayer = L.rectangle(boundsWgs84, {color: "#ff4d4f", weight: 2, fillOpacity: 0.1, dashArray: '5, 5'}).addTo(map);
                map.fitBounds(boundsWgs84, { padding: [20, 20], maxZoom: 16 });

                isMntLoaded = true;
                checkReadyStatus();

            } catch (error) {
                log(`❌ Erreur MNT: ${error.message}`);
                boxTif.classList.remove('active');
                boxTif.classList.add('error');
                mntData = null; 
                isMntLoaded = false;
            }
        });

        // Fonction mathématique pour lire l'altitude
        function getElevationAt(lat, lon) {
            if (!mntData || !mntBbox) return null;
            let xTarget, yTarget;

            if (isLambert93) {
                const coordsL93 = proj4("EPSG:4326", "EPSG:2154", [lon, lat]);
                xTarget = coordsL93[0]; yTarget = coordsL93[1];
            } else {
                xTarget = lon; yTarget = lat;
            }

            const minX = mntBbox[0], minY = mntBbox[1], maxX = mntBbox[2], maxY = mntBbox[3];
            if (xTarget < minX || xTarget > maxX || yTarget < minY || yTarget > maxY) return null;

            const pixelX = Math.floor(((xTarget - minX) / (maxX - minX)) * mntWidth);
            const pixelY = Math.floor(((maxY - yTarget) / (maxY - minY)) * mntHeight);

            if (pixelX < 0 || pixelX >= mntWidth || pixelY < 0 || pixelY >= mntHeight) return null;

            const index = pixelY * mntWidth + pixelX;
            const elevation = mntData[index];

            if (elevation < -500 || elevation > 8000) return null; 
            return elevation;
        }

        // --- ÉTAPE 3 : LE MOTEUR DE FUSION ---
        document.getElementById('btn-process').addEventListener('click', function() {
            if (!kmlXmlDoc || !mntData) return;

            log("🔄 Traitement topographique en cours...");
            const startTime = performance.now();
            
            const coordsNodes = kmlXmlDoc.getElementsByTagName("coordinates");
            let pointsModifies = 0;
            let pointsHorsZone = 0;

            for (let i = 0; i < coordsNodes.length; i++) {
                const node = coordsNodes[i];
                const rawText = node.textContent.trim().replace(/\n/g, ' ');
                const pointsArray = rawText.split(/\s+/);
                
                const newPointsArray = [];

                for (let pt of pointsArray) {
                    const coords = pt.split(',');
                    if (coords.length >= 2) {
                        const lon = parseFloat(coords[0]);
                        const lat = parseFloat(coords[1]);
                        const ancienneAlt = coords.length === 3 ? parseFloat(coords[2]) : 0;

                        if (!isNaN(lon) && !isNaN(lat)) {
                            const vraieAlt = getElevationAt(lat, lon);
                            
                            if (vraieAlt !== null) {
                                newPointsArray.push(`${lon},${lat},${vraieAlt.toFixed(2)}`);
                                pointsModifies++;
                            } else {
                                newPointsArray.push(`${lon},${lat},${ancienneAlt}`);
                                pointsHorsZone++;
                            }
                        }
                    }
                }
                node.textContent = newPointsArray.join(' ');
            }

            const endTime = performance.now();
            
            document.getElementById('box-process').classList.add('active');
            
            log(`✅ Succès en ${(endTime - startTime).toFixed(1)} ms !`);
            log(`🏔️ ${pointsModifies} altitudes corrigées avec le MNT.`);
            
            // Débloque l'étape finale d'exportation
            document.getElementById('box-export').classList.remove('disabled-step');
            log("💾 Vous pouvez maintenant télécharger le fichier corrigé.");
        });

        // --- ÉTAPE 4 : LE MOTEUR D'EXPORTATION ---
        document.getElementById('btn-export').addEventListener('click', function() {
            if (!kmlXmlDoc) return;

            log(`📥 Préparation du téléchargement de ${kmlFileName}...`);

            try {
                // 1. On sérialise l'objet XML en texte brut (Format KML)
                const serializer = new XMLSerializer();
                const xmlString = serializer.serializeToString(kmlXmlDoc);

                // 2. Création d'un Blob (Fichier virtuel)
                const blob = new Blob([xmlString], { type: 'application/vnd.google-earth.kml+xml' });
                const url = URL.createObjectURL(blob);

                // 3. Création d'un lien HTML invisible qu'on "clique" automatiquement
                const a = document.createElement('a');
                a.href = url;
                a.download = kmlFileName;
                document.body.appendChild(a);
                a.click();
                
                // 4. Nettoyage de la mémoire
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                document.getElementById('box-export').classList.add('active');
                log("🎉 Téléchargement réussi ! Fichier prêt pour votre appli AR.");
            } catch (error) {
                log(`❌ Erreur lors de l'exportation : ${error.message}`);
            }
        });

    </script>
</body>
</html>
