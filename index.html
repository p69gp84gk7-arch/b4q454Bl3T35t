<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur Topographique KML / MNT (Version Finale 3D)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.5); overflow-y: auto;}
        #map { flex-grow: 1; height: 100%; background: #000; cursor: crosshair; }
        
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #34495e; padding-bottom: 5px; margin-bottom: 0;}
        
        .file-box { background: #34495e; padding: 12px; border-radius: 8px; border: 1px dashed #7f8c8d; transition: 0.3s; }
        .file-box.active { border-color: #4ade80; background: #27ae60; }
        .file-box.error { border-color: #e74c3c; background: #c0392b; }
        .file-box label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; cursor: pointer;}
        input[type="file"] { width: 100%; color: #bdc3c7; font-size: 12px; }
        
        .action-btn { width: 100%; background: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px;}
        .action-btn:hover { background: #2980b9; }
        .action-btn:active { transform: scale(0.98); }
        
        .download-btn { background: #e67e22; } .download-btn:hover { background: #d35400; }
        .preview-btn { background: #9b59b6; } .preview-btn:hover { background: #8e44ad; }

        #log-panel { background: #1a252f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; color: #4ade80; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.4;}
        .disabled-step { opacity: 0.4; pointer-events: none; }

        /* --- NOUVEAU : FENÊTRE 3D --- */
        #modal-3d {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 3000; display: none; flex-direction: column;
        }
        #header-3d { height: 50px; background: #2c3e50; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; color: white; font-weight: bold; }
        #close-3d { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #canvas-container { flex-grow: 1; width: 100%; height: 100%; position: relative; }
        #loading-3d { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; font-weight: bold; pointer-events: none; text-shadow: 0 2px 4px black;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Atelier Topographique</h2>
        
        <div class="file-box" id="box-kmz">
            <label for="kmz-input">1. Trace (KML/KMZ)</label>
            <input type="file" id="kmz-input" accept=".kml,.kmz">
        </div>
        
        <div class="file-box" id="box-tif">
            <label for="tif-input">2. Terrain (.tif)</label>
            <input type="file" id="tif-input" accept=".tif,.tiff">
        </div>

        <div class="file-box disabled-step" id="box-process">
            <button id="btn-process" class="action-btn">3. Calculer les Altitudes</button>
        </div>

        <div class="file-box disabled-step" id="box-preview">
            <button id="btn-preview" class="action-btn preview-btn">👁️ 4. Prévisualiser en 3D</button>
        </div>

        <div class="file-box disabled-step" id="box-export">
            <button id="btn-export" class="action-btn download-btn">💾 5. Télécharger le KML 3D</button>
        </div>

        <div id="log-panel">En attente de fichiers...</div>
    </div>

    <div id="map"></div>

    <div id="modal-3d">
        <div id="header-3d">
            <span>🌍 Inspecteur Topographique 3D (Molette pour zoomer, Clic gauche pour tourner, Clic droit pour glisser)</span>
            <button id="close-3d">Fermer la vue 3D</button>
        </div>
        <div id="canvas-container">
            <div id="loading-3d">Génération du maillage 3D en cours...</div>
        </div>
    </div>

    <script>
        const logPanel = document.getElementById('log-panel');
        function log(msg) { logPanel.innerText += `\n> ${msg}`; logPanel.scrollTop = logPanel.scrollHeight; }

        proj4.defs("EPSG:2154", "+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

        const map = L.map('map').setView([46.6, 2.2], 6);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);

        const kmlLayerGroup = L.featureGroup().addTo(map);
        let mntBoundsLayer = null; 

        // États
        let isKmzLoaded = false; let isMntLoaded = false;
        let kmlXmlDoc = null; let kmlFileName = "trace_3D.kml"; 
        let mntData = null; let mntWidth = 0, mntHeight = 0; let mntBbox = null; 
        let isLambert93 = false;
        let boundsWgs84Global = null; // Pour centrer la 3D plus tard

        function checkReadyStatus() {
            if (isKmzLoaded && isMntLoaded) document.getElementById('box-process').classList.remove('disabled-step');
        }

        // --- ÉTAPE 1 : KML ---
        document.getElementById('kmz-input').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            log(`Lectue KML...`);
            document.getElementById('box-kmz').classList.add('active');
            kmlLayerGroup.clearLayers();
            kmlFileName = file.name.replace('.kmz', '').replace('.kml', '') + "_Relief_3D.kml";

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = await JSZip.loadAsync(await file.arrayBuffer());
                    kmlText = await zip.files[Object.keys(zip.files).find(n => n.endsWith('.kml'))].async("text");
                } else kmlText = await file.text();

                kmlXmlDoc = new DOMParser().parseFromString(kmlText, "text/xml"); 
                const bounds = L.latLngBounds();

                // Dessin 2D Rapide
                const lines = kmlXmlDoc.getElementsByTagName("LineString");
                for (let l of lines) {
                    const coords = l.getElementsByTagName("coordinates")[0]?.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                    if (coords) {
                        const latLngs = coords.map(c => [parseFloat(c.split(',')[1]), parseFloat(c.split(',')[0])]).filter(c => !isNaN(c[0]));
                        if (latLngs.length) { L.polyline(latLngs, {color: '#FF3B30', weight: 3}).addTo(kmlLayerGroup); latLngs.forEach(c => bounds.extend(c)); }
                    }
                }
                const points = kmlXmlDoc.getElementsByTagName("Point");
                for (let p of points) {
                    const c = p.getElementsByTagName("coordinates")[0]?.textContent.trim().split(',');
                    if (c && c.length>=2) { L.circleMarker([parseFloat(c[1]), parseFloat(c[0])], {radius:4, fillColor:'#FFCC00', color:'#000', weight:1, fillOpacity:1}).addTo(kmlLayerGroup); bounds.extend([parseFloat(c[1]), parseFloat(c[0])]); }
                }

                if (bounds.isValid() && !mntData) map.fitBounds(bounds, { padding: [50, 50] }); 
                isKmzLoaded = true; checkReadyStatus();
            } catch (error) { log(`❌ ERREUR KMZ`); }
        });

        // --- ÉTAPE 2 : MNT ---
        document.getElementById('tif-input').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            log(`Lecture MNT...`);
            document.getElementById('box-tif').classList.add('active');

            try {
                const image = await (await GeoTIFF.fromArrayBuffer(await file.arrayBuffer())).getImage();
                mntBbox = image.getBoundingBox(); mntWidth = image.getWidth(); mntHeight = image.getHeight();
                
                if (Math.abs(mntBbox[0]) > 180) {
                    isLambert93 = true;
                    const sw = proj4("EPSG:2154", "EPSG:4326", [mntBbox[0], mntBbox[1]]);
                    const ne = proj4("EPSG:2154", "EPSG:4326", [mntBbox[2], mntBbox[3]]);
                    boundsWgs84Global = [[sw[1], sw[0]], [ne[1], ne[0]]]; 
                } else {
                    isLambert93 = false;
                    boundsWgs84Global = [[mntBbox[1], mntBbox[0]], [mntBbox[3], mntBbox[2]]];
                }

                mntData = (await image.readRasters())[0]; 
                if (mntBoundsLayer) map.removeLayer(mntBoundsLayer);
                mntBoundsLayer = L.rectangle(boundsWgs84Global, {color: "#ff4d4f", weight: 2, fillOpacity: 0.1, dashArray: '5, 5'}).addTo(map);
                map.fitBounds(boundsWgs84Global, { padding: [20, 20] });
                isMntLoaded = true; checkReadyStatus();
            } catch (error) { log(`❌ Erreur MNT`); }
        });

        function getElevationAt(lat, lon) {
            if (!mntData) return null;
            let xT = lon, yT = lat;
            if (isLambert93) { const c = proj4("EPSG:4326", "EPSG:2154", [lon, lat]); xT = c[0]; yT = c[1]; }
            const px = Math.floor(((xT - mntBbox[0]) / (mntBbox[2] - mntBbox[0])) * mntWidth);
            const py = Math.floor(((mntBbox[3] - yT) / (mntBbox[3] - mntBbox[1])) * mntHeight);
            if (px < 0 || px >= mntWidth || py < 0 || py >= mntHeight) return null;
            const alt = mntData[py * mntWidth + px];
            return (alt > -500 && alt < 8000) ? alt : null;
        }

        // --- ÉTAPE 3 : FUSION ---
        document.getElementById('btn-process').addEventListener('click', function() {
            if (!kmlXmlDoc || !mntData) return;
            log("🔄 Fusion en cours...");
            
            const coordsNodes = kmlXmlDoc.getElementsByTagName("coordinates");
            for (let i = 0; i < coordsNodes.length; i++) {
                const node = coordsNodes[i];
                const pointsArray = node.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                const newPointsArray = [];
                for (let pt of pointsArray) {
                    const coords = pt.split(',');
                    if (coords.length >= 2) {
                        const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                        if (!isNaN(lon) && !isNaN(lat)) {
                            const alt = getElevationAt(lat, lon);
                            newPointsArray.push(`${lon},${lat},${alt !== null ? alt.toFixed(2) : (coords[2]||0)}`);
                        }
                    }
                }
                node.textContent = newPointsArray.join(' ');
            }
            
            document.getElementById('box-process').classList.add('active');
            document.getElementById('box-export').classList.remove('disabled-step');
            document.getElementById('box-preview').classList.remove('disabled-step'); // Débloque la 3D
            log(`✅ Fusion terminée ! Prêt pour la vue 3D ou l'export.`);
        });

        // --- ÉTAPE 5 : EXPORTATION ---
        document.getElementById('btn-export').addEventListener('click', function() {
            const xmlString = new XMLSerializer().serializeToString(kmlXmlDoc);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([xmlString], { type: 'application/vnd.google-earth.kml+xml' }));
            a.download = kmlFileName; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            document.getElementById('box-export').classList.add('active');
        });

        // ==========================================
        // --- BLOC 5 : MOTEUR DE RENDU THREE.JS ---
        // ==========================================
        
        const modal3d = document.getElementById('modal-3d');
        const canvasContainer = document.getElementById('canvas-container');
        let scene, camera, renderer, controls;

        document.getElementById('close-3d').addEventListener('click', () => {
            modal3d.style.display = "none";
            // Nettoyage de la mémoire pour éviter les ralentissements
            if(renderer) { renderer.dispose(); canvasContainer.innerHTML = '<div id="loading-3d">Génération du maillage 3D en cours...</div>'; }
        });

        document.getElementById('btn-preview').addEventListener('click', function() {
            modal3d.style.display = "flex";
            
            // On laisse 100ms au navigateur pour afficher la fenêtre noire avant de figer avec le calcul 3D
            setTimeout(init3DScene, 100); 
        });

        function init3DScene() {
            // 1. Initialisation de l'espace 3D
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Ciel bleu
            scene.fog = new THREE.Fog(0x87CEEB, 1000, 15000); // Brouillard pour cacher l'horizon

            // Lumières
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5000, 10000, 5000);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1.5));

            // 2. Mathématiques de l'emprise (Pour centrer la carte en 0,0,0)
            const minLat = boundsWgs84Global[0][0], maxLat = boundsWgs84Global[1][0];
            const minLon = boundsWgs84Global[0][1], maxLon = boundsWgs84Global[1][1];
            
            // Calcul des distances réelles en mètres (Largeur et Hauteur de la zone)
            const widthMeters = map.distance([minLat, minLon], [minLat, maxLon]);
            const heightMeters = map.distance([minLat, minLon], [maxLat, minLon]);

            // Fonction pour convertir un Lat/Lon GPS en X/Z dans notre monde 3D
            function latLonToVector3(lat, lon, alt) {
                // X = gauche/droite (Longitude)
                const x = ((lon - minLon) / (maxLon - minLon)) * widthMeters - (widthMeters / 2);
                // Z = profondeur (Latitude). Inversé car le Z négatif est "loin devant"
                const z = -(((lat - minLat) / (maxLat - minLat)) * heightMeters - (heightMeters / 2));
                // Y = Altitude réelle (On peut la multiplier par 1.2 si on veut exagérer le relief)
                return new THREE.Vector3(x, alt, z);
            }

            // 3. GÉNÉRATION DU TERRAIN 3D (Le fameux Maillage)
            // On ne crée pas 4000x4000 cases, on limite à 150x150 pour la fluidité
            const segmentsX = 150, segmentsY = 150;
            const terrainGeo = new THREE.PlaneGeometry(widthMeters, heightMeters, segmentsX, segmentsY);
            terrainGeo.rotateX(-Math.PI / 2); // On couche le plan à l'horizontale

            const vertices = terrainGeo.attributes.position.array;
            let minAlt = Infinity;

            for (let i = 0; i <= segmentsY; i++) {
                for (let j = 0; j <= segmentsX; j++) {
                    // Pour chaque nœud du filet, on calcule sa vraie coordonnée GPS
                    const lon = minLon + (j / segmentsX) * (maxLon - minLon);
                    const lat = maxLat - (i / segmentsY) * (maxLat - minLat); // maxLat car on part du haut
                    
                    const alt = getElevationAt(lat, lon) || 0;
                    if (alt < minAlt) minAlt = alt;

                    // On modifie l'axe Y (index 1, 4, 7...) du vertex
                    const index = (i * (segmentsX + 1) + j) * 3;
                    vertices[index + 1] = alt; 
                }
            }

            terrainGeo.computeVertexNormals(); // Calcule les ombres du relief

            // Matériel du terrain (Vert avec un effet fil de fer "Tron")
            const terrainMat = new THREE.MeshStandardMaterial({ 
                color: 0x2ecc71, 
                wireframe: false, 
                roughness: 0.8 
            });
            const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
            scene.add(terrainMesh);

            // Pour voir la grille de relief par-dessus
            const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x27ae60, wireframe: true, transparent: true, opacity: 0.2 });
            const wireframeMesh = new THREE.Mesh(terrainGeo, wireframeMat);
            scene.add(wireframeMesh);

            // 4. GÉNÉRATION DES LIGNES (Traces KML modifiées)
            const lineMat = new THREE.LineBasicMaterial({ color: 0xFF0000, linewidth: 3 });
            const lines = kmlXmlDoc.getElementsByTagName("LineString");
            for (let l of lines) {
                const coords = l.getElementsByTagName("coordinates")[0]?.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                if (coords) {
                    const points = [];
                    coords.forEach(c => {
                        const pts = c.split(',');
                        if (pts.length >= 3) {
                            const lon = parseFloat(pts[0]), lat = parseFloat(pts[1]), alt = parseFloat(pts[2]);
                            // On ajoute +5 mètres à l'altitude pour que la ligne ne s'enfonce pas dans le sol 3D
                            points.push(latLonToVector3(lat, lon, alt + 5)); 
                        }
                    });
                    if (points.length > 1) {
                        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                        const lineMesh = new THREE.Line(lineGeo, lineMat);
                        scene.add(lineMesh);
                    }
                }
            }

            // 5. GÉNÉRATION DES CANONS (Sphères)
            const sphereGeo = new THREE.SphereGeometry(20, 16, 16); // Rayon de 20 mètres pour être visible de loin
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0xFFCC00 });
            const points = kmlXmlDoc.getElementsByTagName("Point");
            for (let p of points) {
                const c = p.getElementsByTagName("coordinates")[0]?.textContent.trim().split(',');
                if (c && c.length >= 3) {
                    const lon = parseFloat(c[0]), lat = parseFloat(c[1]), alt = parseFloat(c[2]);
                    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                    const pos = latLonToVector3(lat, lon, alt + 10);
                    sphere.position.copy(pos);
                    scene.add(sphere);
                }
            }

            // 6. CAMÉRA ET RENDU
            camera = new THREE.PerspectiveCamera(60, canvasContainer.clientWidth / canvasContainer.clientHeight, 1, 30000);
            // On place la caméra au sud du domaine, en hauteur
            camera.position.set(0, minAlt + 3000, heightMeters); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
            document.getElementById('loading-3d').style.display = "none";
            canvasContainer.appendChild(renderer.domElement);

            // Contrôles de vol
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, minAlt, 0); // On regarde le centre de la montagne
            controls.maxPolarAngle = Math.PI / 2 - 0.1; // Empêche de passer sous le sol
            controls.update();

            // Boucle d'animation
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
            
            // Gestion du redimensionnement
            window.addEventListener('resize', () => {
                if(!camera || !renderer) return;
                camera.aspect = canvasContainer.clientWidth / canvasContainer.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
            });
        }
    </script>
</body>
</html>
