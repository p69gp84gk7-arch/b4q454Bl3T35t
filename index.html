<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur Topographique KML / MNT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; font-family: -apple-system, sans-serif; }
        
        /* Panneau de contrôle latéral */
        #sidebar {
            width: 350px;
            background: #2c3e50;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        
        /* La zone de la carte */
        #map { flex-grow: 1; height: 100%; background: #000; }
        
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .file-box {
            background: #34495e;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #7f8c8d;
        }
        .file-box label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        input[type="file"] { width: 100%; color: #bdc3c7; font-size: 12px; }
        
        #log-panel {
            background: #1a252f;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #4ade80;
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Atelier Topographique</h2>
        
        <div class="file-box">
            <label for="kmz-input">1. Charger la trace (KML/KMZ)</label>
            <input type="file" id="kmz-input" accept=".kml,.kmz">
        </div>
        
        <div class="file-box" style="opacity: 0.5;">
            <label>2. Charger le MNT (.tif)</label>
            <div style="font-size: 11px; color:#bdc3c7;">(Fonctionnalité du Bloc 2)</div>
        </div>

        <div id="log-panel">En attente de fichiers...</div>
    </div>

    <div id="map"></div>

    <script>
        const logPanel = document.getElementById('log-panel');
        function log(msg) { logPanel.innerText += `\n> ${msg}`; logPanel.scrollTop = logPanel.scrollHeight; }

        // --- INITIALISATION DE LA CARTE 2D (Leaflet) ---
        // On centre par défaut sur la France, mais la carte s'ajustera au KMZ
        const map = L.map('map').setView([46.603354, 1.888334], 6);

        // Ajout d'un fond de carte Satellite (Esri)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // Groupe pour stocker les dessins du KML
        const kmlLayerGroup = L.featureGroup().addTo(map);

        // --- BLOC 1 : LECTURE DU KMZ VERS LA CARTE 2D ---
        document.getElementById('kmz-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            log(`Chargement de ${file.name}...`);
            kmlLayerGroup.clearLayers();

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    log("Décompression du KMZ...");
                    const arrayBuffer = await file.arrayBuffer();
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    const kmlFilename = Object.keys(zip.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML trouvé.");
                    kmlText = await zip.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }

                log("Analyse géométrique...");
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                
                let stats = { points: 0, lines: 0, polygons: 0 };
                const bounds = L.latLngBounds(); // Pour recentrer la caméra à la fin

                // 1. Dessiner les Surfaces (Polygons)
                const polygons = xmlDoc.getElementsByTagName("Polygon");
                for (let p of polygons) {
                    const coordsNode = p.getElementsByTagName("coordinates")[0];
                    if (coordsNode) {
                        const coords = coordsNode.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                        const latLngs = [];
                        coords.forEach(c => {
                            const pts = c.split(',');
                            if (pts.length >= 2) {
                                const latLng = [parseFloat(pts[1]), parseFloat(pts[0])]; // Leaflet utilise [Lat, Lon]
                                latLngs.push(latLng);
                                bounds.extend(latLng);
                            }
                        });
                        if (latLngs.length > 0) {
                            L.polygon(latLngs, {color: '#3498db', weight: 2, fillOpacity: 0.4}).addTo(kmlLayerGroup);
                            stats.polygons++;
                        }
                    }
                }

                // 2. Dessiner les Lignes (LineString)
                const lines = xmlDoc.getElementsByTagName("LineString");
                for (let l of lines) {
                    const coordsNode = l.getElementsByTagName("coordinates")[0];
                    if (coordsNode) {
                        const coords = coordsNode.textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                        const latLngs = [];
                        coords.forEach(c => {
                            const pts = c.split(',');
                            if (pts.length >= 2) {
                                const latLng = [parseFloat(pts[1]), parseFloat(pts[0])];
                                latLngs.push(latLng);
                                bounds.extend(latLng);
                            }
                        });
                        if (latLngs.length > 0) {
                            L.polyline(latLngs, {color: '#FF3B30', weight: 4}).addTo(kmlLayerGroup);
                            stats.lines++;
                        }
                    }
                }

                // 3. Dessiner les Points (Canons)
                const placemarks = xmlDoc.getElementsByTagName("Placemark");
                for (let pm of placemarks) {
                    const ptNode = pm.getElementsByTagName("Point")[0];
                    if (ptNode) {
                        const coordsNode = ptNode.getElementsByTagName("coordinates")[0];
                        if (coordsNode) {
                            const pts = coordsNode.textContent.trim().split(',');
                            if (pts.length >= 2) {
                                const nameNode = pm.getElementsByTagName("name")[0];
                                const name = nameNode ? nameNode.textContent.trim() : "Point";
                                const latLng = [parseFloat(pts[1]), parseFloat(pts[0])];
                                
                                L.circleMarker(latLng, {
                                    radius: 6, fillColor: '#FFCC00', color: '#000', weight: 1, fillOpacity: 1
                                }).bindPopup(`<b>${name}</b>`).addTo(kmlLayerGroup);
                                
                                bounds.extend(latLng);
                                stats.points++;
                            }
                        }
                    }
                }

                log(`Succès: ${stats.points} Points, ${stats.lines} Traces, ${stats.polygons} Zones.`);
                
                // Zoomer automatiquement sur la zone chargée
                if (stats.points > 0 || stats.lines > 0 || stats.polygons > 0) {
                    map.fitBounds(bounds, { padding: [50, 50] });
                }

            } catch (error) {
                log(`ERREUR: ${error.message}`);
            }
        });
    </script>
</body>
</html>
