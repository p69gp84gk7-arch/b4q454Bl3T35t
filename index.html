        // Variables Globales 
        window.playerAlt = 0;
        window.altitudeMap = {}; // Contiendra les réponses de l'API

        // --- LECTEUR D'ALTITUDE API ---
        window.getApiRelativeAltitude = function(lonStr, latStr) {
            const key = `${parseFloat(lonStr)},${parseFloat(latStr)}`;
            if (window.altitudeMap[key] !== undefined && window.altitudeMap[key] !== null) {
                // Altitude API - Altitude iPhone - 1.5m (Hauteur des yeux vers le sol)
                return window.altitudeMap[key] - window.playerAlt - 1.5;
            }
            return -1.5; // Sécurité si l'API a raté un point
        };

        // --- 1. TUBE 3D (Traces modelées par l'API) ---
        AFRAME.registerComponent('kml-tube', {
            schema: { points: {type: 'string', default: ''}, color: {type: 'color', default: '#FF3B30'}, opacity: {type: 'number', default: 0.8} },
            init: function() {
                const pointsArr = this.data.points.trim().replace(/\n/g, ' ').split(/\s+/);
                if (pointsArr.length < 2) return;

                const pt0 = pointsArr[0].split(',');
                const lon0 = parseFloat(pt0[0]), lat0 = parseFloat(pt0[1]);
                if(isNaN(lon0) || isNaN(lat0)) return; 

                const pathPoints = [];
                let lastX = null, lastZ = null;

                for(let i=0; i < pointsArr.length; i++) {
                    const pt = pointsArr[i].split(',');
                    if (pt.length >= 2) {
                        const lon = parseFloat(pt[0]), lat = parseFloat(pt[1]);
                        if(!isNaN(lon) && !isNaN(lat)){
                            const dist = calculateDistance(lat0, lon0, lat, lon);
                            const bearing = calculateBearing(lat0, lon0, lat, lon);
                            const x = dist * Math.sin(bearing);
                            const z = -dist * Math.cos(bearing);

                            // L'altitude est lue directement depuis l'API pour chaque point de la courbe !
                            const relAlt = window.getApiRelativeAltitude(pt[0], pt[1]);

                            // Nettoyage des doublons géométriques
                            if (lastX !== null && Math.abs(x - lastX) < 0.1 && Math.abs(z - lastZ) < 0.1) continue;

                            pathPoints.push(new THREE.Vector3(x, relAlt, z));
                            lastX = x; lastZ = z;
                        }
                    }
                }

                if (pathPoints.length < 2) return;
                try {
                    const curve = new THREE.CatmullRomCurve3(pathPoints);
                    const geometry = new THREE.TubeGeometry(curve, pathPoints.length, 1.5, 6, false);
                    const material = new THREE.MeshBasicMaterial({color: this.data.color, transparent: true, opacity: this.data.opacity});
                    const mesh = new THREE.Mesh(geometry, material);
                    this.el.setObject3D('mesh', mesh);
                } catch (e) {}
            }
        });

        // --- 2. SURFACES 3D (Polygones modelés par l'API) ---
        AFRAME.registerComponent('kml-polygon', {
            schema: { points: {type: 'string', default: ''}, color: {type: 'color', default: '#3498db'}, opacity: {type: 'number', default: 0.4} },
            init: function() {
                const pointsArr = this.data.points.trim().replace(/\n/g, ' ').split(/\s+/);
                if (pointsArr.length < 3) return;
                
                const pt0 = pointsArr[0].split(',');
                const lon0 = parseFloat(pt0[0]), lat0 = parseFloat(pt0[1]);
                if(isNaN(lon0) || isNaN(lat0)) return; 
                
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                
                const original3DPoints = [];

                for(let i = 0; i < pointsArr.length; i++) {
                    const pt = pointsArr[i].split(',');
                    if (pt.length >= 2) {
                        const lon = parseFloat(pt[0]), lat = parseFloat(pt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        
                        const dist = calculateDistance(lat0, lon0, lat, lon);
                        const bearing = calculateBearing(lat0, lon0, lat, lon);
                        const x = dist * Math.sin(bearing);
                        const z = -dist * Math.cos(bearing); 
                        
                        const relAlt = window.getApiRelativeAltitude(pt[0], pt[1]);
                        
                        original3DPoints.push({x: x, y: relAlt, z: z});

                        if (i === 0) shape.moveTo(x, z);
                        else shape.lineTo(x, z);
                    }
                }

                const geometry = new THREE.ShapeGeometry(shape);
                geometry.rotateX(-Math.PI / 2); 
                
                // Déformation du polygone pour coller au terrain
                const posAttribute = geometry.attributes.position;
                for (let i = 0; i < posAttribute.count; i++) {
                    const vx = posAttribute.getX(i);
                    const vz = posAttribute.getZ(i);
                    let closestAlt = -1.5; 
                    let minDist = Infinity;
                    for(let j=0; j<original3DPoints.length; j++) {
                        const distSq = Math.pow(original3DPoints[j].x - vx, 2) + Math.pow(original3DPoints[j].z - vz, 2);
                        if(distSq < minDist) { minDist = distSq; closestAlt = original3DPoints[j].y; }
                    }
                    posAttribute.setY(i, closestAlt);
                }
                
                geometry.computeVertexNormals();
                const material = new THREE.MeshBasicMaterial({ color: this.data.color, transparent: true, opacity: this.data.opacity, side: THREE.DoubleSide, depthWrite: false });
                const mesh = new THREE.Mesh(geometry, material);
                
                this.el.setObject3D('mesh', mesh);
            }
        });

        // Outils Mathématiques
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180, phi1 = lat1 * toRad, phi2 = lat2 * toRad, lam1 = lon1 * toRad, lam2 = lon2 * toRad;
            const y = Math.sin(lam2 - lam1) * Math.cos(phi2), x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lam2 - lam1);
            return Math.atan2(y, x); 
        }
    </script>

<body>

    <div id="loading-overlay">
        <div id="loading-text">Analyse du Terrain (API)...</div>
        <progress id="loading-bar" value="0" max="100"></progress>
    </div>

    <div id="ui-layer">
        <label for="file-input" class="upload-btn">Charger KML/KMZ</label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <div id="status-message">📍 Autorisez la caméra</div>
    <div id="altitude-debug">Alt. iPhone : Recherche...</div>

    <div id="calibration-panel">
        <div class="cal-btn" id="btn-toggle-mode" style="border-color: #007aff; color: #007aff;">Glisser : ALTITUDE (Y)</div>
        <div class="cal-btn" id="btn-reset">Reset Position</div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-camera gps-camera="minDistance: 1; maxDistance: 10000;" rotation-reader></a-camera>
        <a-entity id="kml-container" position="0 0 0"></a-entity>
    </a-scene>

    <script>
        const statusEl = document.getElementById('status-message');
        const altDebugEl = document.getElementById('altitude-debug');
        const containerEl = document.getElementById('kml-container');
        const calibPanel = document.getElementById('calibration-panel');
        const btnToggleMode = document.getElementById('btn-toggle-mode');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingBar = document.getElementById('loading-bar');

        // --- JOYSTICK TACTILE ---
        window.dragMode = 'Y';
        btnToggleMode.onclick = () => {
            if (window.dragMode === 'Y') {
                window.dragMode = 'Z';
                btnToggleMode.innerText = "Glisser : PROFONDEUR (Z)";
                btnToggleMode.style.borderColor = "#ff4d4f";
                btnToggleMode.style.color = "#ff4d4f";
            } else {
                window.dragMode = 'Y';
                btnToggleMode.innerText = "Glisser : ALTITUDE (Y)";
                btnToggleMode.style.borderColor = "#007aff";
                btnToggleMode.style.color = "#007aff";
            }
        };

        let isCalibrating = false;
        let lastTouchX = 0, lastTouchY = 0;
        let offsetCompass = 0, offsetAlt = 0, offsetDepth = 0;

        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('#ui-layer') || e.target.closest('#calibration-panel')) return; 
            isCalibrating = true;
            lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
            statusEl.style.color = "#FFCC00";
        });

        document.addEventListener('touchmove', (e) => {
            if (!isCalibrating) return;
            e.preventDefault(); 
            const deltaX = e.touches[0].clientX - lastTouchX;
            const deltaY = e.touches[0].clientY - lastTouchY;
            lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;

            offsetCompass += deltaX * 0.2; 
            if (window.dragMode === 'Y') offsetAlt -= deltaY * 0.05; 
            else offsetDepth += deltaY * 0.1; 

            containerEl.setAttribute('rotation', `0 ${offsetCompass} 0`);
            containerEl.setAttribute('position', `0 ${offsetAlt} ${offsetDepth}`);
            statusEl.innerText = `Boussole: ${offsetCompass.toFixed(0)}° | Alt: ${offsetAlt.toFixed(1)}m | Prof: ${offsetDepth.toFixed(1)}m`;
        }, {passive: false});

        document.addEventListener('touchend', () => { isCalibrating = false; statusEl.style.color = "white"; });

        document.getElementById('btn-reset').onclick = () => { 
            offsetCompass = 0; offsetAlt = 0; offsetDepth = 0;
            containerEl.setAttribute('rotation', '0 0 0');
            containerEl.setAttribute('position', '0 0 0');
        };

        // --- GPS EN DIRECT ---
        window.addEventListener('load', () => {
            if (!("geolocation" in navigator)) { statusEl.innerText = "❌ GPS non supporté."; return; }
            navigator.geolocation.watchPosition(
                (pos) => { 
                    window.playerAlt = pos.coords.altitude !== null ? pos.coords.altitude : 0;
                    altDebugEl.innerText = `Alt. iPhone : ${Math.round(window.playerAlt)} m`;
                    if(statusEl.innerText.includes("Autorisez")) statusEl.innerText = `📍 Prêt. Chargez un fichier.`;
                },
                (e) => { statusEl.style.color = "#ff4d4f"; statusEl.innerText = "❌ ERREUR GPS."; },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // --- CHARGEMENT KML ET APPEL API TOPODATA ---
        document.getElementById('file-input').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            while (containerEl.firstChild) { containerEl.removeChild(containerEl.firstChild); }
            calibPanel.style.display = "none"; 
            loadingOverlay.style.display = "flex";
            loadingBar.value = 0;

            offsetCompass = 0; offsetAlt = 0; offsetDepth = 0;
            containerEl.setAttribute('rotation', '0 0 0');
            containerEl.setAttribute('position', '0 0 0');
            window.altitudeMap = {}; 

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    loadingText.innerText = "Décompression du KMZ...";
                    const zip = await JSZip.loadAsync(file);
                    const kmlFilename = Object.keys(zip.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML dans le KMZ.");
                    kmlText = await zip.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }
                
                loadingText.innerText = "Extraction des coordonnées...";
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                
                const uniqueCoords = new Set();
                const coordsTags = xmlDoc.getElementsByTagName("coordinates");
                for(let i=0; i<coordsTags.length; i++) {
                    const points = coordsTags[i].textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                    points.forEach(pt => {
                        const parts = pt.split(',');
                        if(parts.length >= 2 && !isNaN(parseFloat(parts[0])) && !isNaN(parseFloat(parts[1]))) {
                            uniqueCoords.add(`${parseFloat(parts[0])},${parseFloat(parts[1])}`);
                        }
                    });
                }
                
                const coordsArray = Array.from(uniqueCoords);
                
                // Appel API OpenTopoData (100 points / seconde)
                const chunkSize = 100;
                for(let i = 0; i < coordsArray.length; i += chunkSize) {
                    const chunk = coordsArray.slice(i, i + chunkSize);
                    const locationsStr = chunk.map(str => {
                        const parts = str.split(','); return `${parts[1]},${parts[0]}`; // L'API veut Lat,Lon
                    }).join('|');

                    loadingText.innerText = `Interrogation du relief spatial (${Math.min(i + chunkSize, coordsArray.length)}/${coordsArray.length})...`;
                    loadingBar.value = (i / coordsArray.length) * 100;

                    try {
                        const res = await fetch(`https://api.opentopodata.org/v1/mapzen?locations=${locationsStr}`);
                        const data = await res.json();
                        if(data && data.results) {
                            for(let j=0; j<chunk.length; j++) {
                                window.altitudeMap[chunk[j]] = data.results[j].elevation;
                            }
                        }
                    } catch(err) { console.warn("Erreur API Topo", err); }

                    if (i + chunkSize < coordsArray.length) {
                        await new Promise(resolve => setTimeout(resolve, 1100)); // Délais serveur obligatoire
                    }
                }

                loadingBar.value = 100;
                loadingText.innerText = "Génération de la 3D...";

                setTimeout(() => {
                    try { 
                        processKMLData(xmlDoc); 
                        loadingOverlay.style.display = "none";
                    } catch(e) { 
                        loadingText.innerText = "🚨 Erreur : " + e.message; 
                    }
                }, 500);

            } catch (error) {
                loadingText.innerText = "🚨 Erreur : " + error.message;
            }
        });

        // --- GÉNÉRATEUR FINAL ---
        function processKMLData(xmlDoc) {
            let stats = { canons: 0, traces: 0, surfaces: 0 };

            // 1. SURFACES
            const polygons = xmlDoc.getElementsByTagName("Polygon");
            for (let i = 0; i < polygons.length; i++) {
                const coordsTags = polygons[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const text = coordsTags[0].textContent.trim();
                    const firstPt = text.split(/\s+/)[0].split(',');
                    if (firstPt.length >= 2) {
                        const lon = parseFloat(firstPt[0]), lat = parseFloat(firstPt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        
                        const surfaceEl = document.createElement('a-entity');
                        surfaceEl.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        surfaceEl.setAttribute('kml-polygon', `points: ${text}; color: #3498db; opacity: 0.5;`);
                        containerEl.appendChild(surfaceEl);
                        stats.surfaces++;
                    }
                }
            }

            // 2. TRACES (Tubes 3D formés par l'API)
            const lines = xmlDoc.getElementsByTagName("LineString");
            for (let i = 0; i < lines.length; i++) {
                const coordsTags = lines[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const text = coordsTags[0].textContent.trim();
                    const firstPt = text.split(/\s+/)[0].split(',');
                    if (firstPt.length >= 2) {
                        const lon = parseFloat(firstPt[0]), lat = parseFloat(firstPt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        
                        const lineEl = document.createElement('a-entity');
                        lineEl.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        lineEl.setAttribute('kml-tube', `points: ${text}; color: #FF3B30; opacity: 0.8;`);
                        containerEl.appendChild(lineEl);
                        stats.traces++;
                    }
                }
            }

            // 3. CANONS
            const placemarks = xmlDoc.getElementsByTagName("Placemark");
            for (let i = 0; i < placemarks.length; i++) {
                const pointNode = placemarks[i].getElementsByTagName("Point")[0];
                if (pointNode) {
                    const coordsTags = pointNode.getElementsByTagName("coordinates");
                    if (coordsTags.length > 0) {
                        const coords = coordsTags[0].textContent.trim().split(',');
                        if (coords.length >= 2) {
                            const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                            if(isNaN(lon) || isNaN(lat)) continue; 

                            const nameNode = placemarks[i].getElementsByTagName("name")[0];
                            const canonId = nameNode ? nameNode.textContent.trim() : null;

                            let vraieAltitude = null; let sourceAlt = "Manquante";
                            
                            // TSV Local en priorité
                            if (canonId && baseAltitudesCanons[canonId]) {
                                vraieAltitude = baseAltitudesCanons[canonId];
                                sourceAlt = vraieAltitude + "m (TSV)";
                            } else {
                                // Sinon l'API topographique
                                const apiAlt = window.altitudeMap[`${lon},${lat}`];
                                if (apiAlt !== undefined && apiAlt !== null) {
                                    vraieAltitude = apiAlt;
                                    sourceAlt = Math.round(vraieAltitude) + "m (API)";
                                }
                            }

                            // -1.5m pour l'affichage au sol
                            let relAlt = vraieAltitude !== null ? (vraieAltitude - window.playerAlt) - 1.5 : -1.5;
                            stats.canons++;

                            const pointGroup = document.createElement('a-entity');
                            pointGroup.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                            const heightContainer = document.createElement('a-entity');
                            heightContainer.setAttribute('position', `0 ${relAlt} 0`);

                            const sphere = document.createElement('a-sphere');
                            sphere.setAttribute('radius', '3.5');
                            sphere.setAttribute('color', '#FFCC00'); 
                            heightContainer.appendChild(sphere);

                            const etiquette = document.createElement('a-text');
                            const nomAffichage = canonId ? canonId : `Inc_${stats.canons}`;
                            const texteAffiche = `C-${nomAffichage}\nAlt: ${sourceAlt}\nDif: ${Math.round(relAlt)}m`;
                            
                            etiquette.setAttribute('value', texteAffiche);
                            etiquette.setAttribute('look-at', '[gps-camera]'); 
                            etiquette.setAttribute('scale', '10 10 10'); 
                            etiquette.setAttribute('position', '0 6 0'); 
                            etiquette.setAttribute('align', 'center');
                            etiquette.setAttribute('color', '#FFFFFF');
                            etiquette.setAttribute('geometry', 'primitive: plane; height: auto; width: auto');
                            etiquette.setAttribute('material', 'color: #000000; opacity: 0.7');
                            
                            heightContainer.appendChild(etiquette);
                            pointGroup.appendChild(heightContainer);
                            containerEl.appendChild(pointGroup); 
                        }
                    }
                }
            }

            statusEl.innerText = `${stats.canons} Canons, ${stats.traces} Traces. Topo API.`;
            calibPanel.style.display = "flex"; 
        }
    </script>
</body>
</html>
