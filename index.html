<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trace AR iPhone</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #ui-layer { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .upload-btn { background-color: rgba(255, 255, 255, 0.9); color: #007aff; padding: 12px 24px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #file-input { display: none; }
        #status-message { position: absolute; top: 20px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 1000; font-size: 18px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
<body>

    <div id="status-message">📍 Autorisez la caméra, puis chargez un fichier</div>
    <div id="ui-layer">
        <label for="file-input" class="upload-btn">Ouvrir KML/KMZ</label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-camera gps-projected-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const statusEl = document.getElementById('status-message');
        const sceneEl = document.querySelector('a-scene');

        // --- BLOC 6 : DIAGNOSTIC DU SERVICE DE LOCALISATION ---
        function verifierGPS() {
            if (!("geolocation" in navigator)) {
                statusEl.innerText = "❌ GPS non supporté par ce navigateur.";
                return;
            }

            statusEl.innerText = "⏳ Vérification du capteur GPS...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    statusEl.innerText = "📍 GPS Actif. Vous pouvez charger un fichier.";
                    statusEl.style.color = "#4ade80"; 
                },
                (error) => {
                    statusEl.style.color = "#ff4d4f"; 
                    if (error.code === error.PERMISSION_DENIED) {
                        statusEl.innerText = "❌ ERREUR : Activez la localisation dans les réglages de l'iPhone !";
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        statusEl.innerText = "❌ ERREUR : Signal GPS introuvable (êtes-vous en intérieur ?).";
                    } else {
                        statusEl.innerText = "❌ ERREUR GPS : Délai d'attente dépassé.";
                    }
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        }

        // Déclencher la vérification dès l'ouverture de l'application
        window.addEventListener('load', verifierGPS);

      // Écouteur d'événement sur le bouton d'upload
        document.getElementById('file-input').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) {
                statusEl.innerText = "❌ Aucun fichier sélectionné.";
                return;
            }

            // On affiche des infos de base sur le fichier
            statusEl.innerText = `🔍 Fichier capté : ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            statusEl.style.color = "white"; 

            try {
                let kmlText = "";
                const fileNameLower = file.name.toLowerCase();

                // --- BLOC 3 : DÉCOMPRESSION ET LECTURE ---
                if (fileNameLower.endsWith('.kmz')) {
                    statusEl.innerText = "📦 Étape 1 : Fichier KMZ détecté. Décompression...";
                    
                    const zip = new JSZip();
                    // On attend que JSZip lise le fichier
                    const contents = await zip.loadAsync(file);
                    
                    statusEl.innerText = "📂 Étape 2 : Archive ouverte. Recherche du KML...";
                    
                    // On liste tous les fichiers dans le ZIP pour voir ce qu'il contient
                    const fileNames = Object.keys(contents.files);
                    console.log("Fichiers dans le KMZ :", fileNames);
                    
                    const kmlFilename = fileNames.find(name => name.toLowerCase().endsWith('.kml'));
                    
                    if (!kmlFilename) {
                        throw new Error("Aucun fichier .kml trouvé dans ce KMZ. Contenu : " + fileNames.join(", "));
                    }
                    
                    statusEl.innerText = `📄 Étape 3 : KML trouvé (${kmlFilename}). Extraction du texte...`;
                    kmlText = await contents.files[kmlFilename].async("text");

                } else if (fileNameLower.endsWith('.kml')) {
                    statusEl.innerText = "📄 Étape 1 : Fichier KML détecté. Lecture direct...";
                    kmlText = await file.text();
                } else {
                    throw new Error("L'extension du fichier n'est ni .kml ni .kmz");
                }

                // Si on arrive ici, on a le texte brut
                statusEl.innerText = `✅ Étape 4 : Texte extrait (${kmlText.length} caractères). Parsing 3D...`;
                
                // On attend une demi-seconde pour laisser le temps à l'utilisateur de lire le message
                setTimeout(() => {
                    processKMLData(kmlText);
                }, 500);

            } catch (error) {
                // On capture n'importe quelle erreur et on l'affiche en rouge foncé
                console.error(error);
                statusEl.style.color = "#ff4d4f";
                statusEl.innerText = "🚨 ERREUR : " + error.message;
            }
        });
        // Fonctionnalité : Extraction des coordonnées et création des objets AR
        function processKMLData(kmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlString, "text/xml");
            const coordinatesTags = xmlDoc.getElementsByTagName("coordinates");
            
            if (coordinatesTags.length === 0) {
                statusEl.innerText = "Erreur : Aucune coordonnée trouvée.";
                return;
            }

            let pointsCount = 0;
            let firstPointLat = null;
            let firstPointLon = null;

            // Extraction des points
            for (let i = 0; i < coordinatesTags.length; i++) {
                const text = coordinatesTags[i].textContent.trim();
                const points = text.split(/\s+/);
                const step = Math.max(1, Math.floor(points.length / 100)); 

                for (let j = 0; j < points.length; j += step) {
                    const coords = points[j].split(',');
                    if (coords.length >= 2) {
                        const lon = parseFloat(coords[0]);
                        const lat = parseFloat(coords[1]);

                        // Capturer le tout premier point de la trace pour le test
                        if (firstPointLat === null) {
                            firstPointLat = lat;
                            firstPointLon = lon;
                        }

                        const jalon = document.createElement('a-sphere');
                        jalon.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        jalon.setAttribute('radius', '3'); 
                        jalon.setAttribute('color', '#FF3B30'); 
                        jalon.setAttribute('opacity', '0.8');
                        sceneEl.appendChild(jalon);
                        pointsCount++;
                    }
                }
            }
            
            // Vérification de votre position GPS par rapport à la trace
            if (navigator.geolocation && firstPointLat !== null) {
                statusEl.innerText = `Trace de ${pointsCount} points. Calcul de votre distance...`;
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLon = position.coords.longitude;
                        const distanceMetres = calculateDistance(userLat, userLon, firstPointLat, firstPointLon);
                        
                        let distanceTexte = distanceMetres > 1000 
                            ? (distanceMetres / 1000).toFixed(2) + " km" 
                            : Math.round(distanceMetres) + " m";

                        statusEl.innerText = `Trace chargée. Début à ${distanceTexte} de vous.`;
                        
                        // Si la trace est à plus de 5km, on avertit l'utilisateur
                        if (distanceMetres > 5000) {
                            statusEl.style.color = "#FFcc00"; 
                            statusEl.innerText += " (Trop loin pour être visible !)";
                        }
                    },
                    (error) => {
                        statusEl.innerText = `Trace de ${pointsCount} points. (Erreur GPS: ${error.message})`;
                    },
                    { enableHighAccuracy: true } 
                );
            } else {
                statusEl.innerText = `Trace chargée (${pointsCount} jalons affichés)`;
            }
        }

        // --- BLOC 5 : OUTIL DE DISTANCE (Formule de Haversine) ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }
    </script>
</body>
</html>
