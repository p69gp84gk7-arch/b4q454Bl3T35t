<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trace AR iPhone - Drag X/Y (Altitude)</title>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background-color: #000; }
        #ui-layer { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .upload-btn { background-color: rgba(255, 255, 255, 0.9); color: #007aff; padding: 12px 24px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; }
        #file-input { display: none; }
        
        #status-message { position: absolute; top: 70px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 1000; font-size: 14px; padding: 0 10px; box-sizing: border-box; pointer-events: none; }
        #altitude-debug { position: absolute; top: 90px; width: 100%; text-align: center; color: #4ade80; font-size: 12px; text-shadow: 1px 1px 2px black; z-index: 1000; font-weight: bold; pointer-events: none;}
        
        /* Bouton de réinitialisation unique et discret */
        #calibration-panel {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: none; 
        }
        .cal-btn { height: 50px; width: 50px; border-radius: 25px; background: rgba(255,255,255,0.8); font-size: 14px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .cal-btn:active { background: #ff4d4f; color: white; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script>
        // La Base de Données Altitudes TSV
        const baseAltitudesCanons = { "1": 1479.13, "3": 1483.37, "4": 1488.34, "5": 1499.34, "6": 1514.64, "7": 1525.86, "8": 1536.38, "9": 1545.48, "10": 1556.86, "11": 1565.4, "12": 1574.41, "13": 1584.13, "14": 1597.25, "15": 1611.2, "16": 1627.85, "17": 1641.34, "19": 1658.16, "21": 1669.33, "22": 1678.93, "23": 1693.59, "24": 1705.7, "25": 1713.46, "26": 1719.52, "27": 1723.04, "28": 1725.49, "29": 1735.08, "30": 1748.74, "31": 1765, "34": 1677.82, "36": 1703.71, "37": 1717.1, "38": 1732.29, "39": 1744.22, "40": 1753.8, "41": 1765.66, "42": 1779.46, "43": 1791.08, "44": 1801.31, "45": 1809.83, "48": 1813.67, "49": 1812.99, "51": 1789.55, "52": 1781.06, "53": 1771.95, "54": 1758.97, "55": 1745.04, "58": 1788.26, "59": 1770.3, "60": 1754.44, "61": 1740.98, "62": 1728.93, "63": 1712.57, "65": 1488.31, "66": 1493.06, "67": 1493.18, "68": 1499.88, "69": 1515.76, "70": 1530.27, "71": 1543.46, "72": 1555.18, "73": 1568.21, "74": 1587.09, "75": 1612.13, "76": 1636.5, "77": 1651.28, "78": 1664.79, "79": 1677.99, "80": 1687.71, "81": 1705.46, "82": 1722.01, "83": 1739.94, "84": 1758.63, "85": 1778.63, "86": 1803.76, "87": 1838.55, "88": 1867.06, "89": 1860.79, "90": 1858.55, "91": 1870.2, "98": 1525.45, "99": 1534.99, "100": 1546.05, "101": 1558.28, "102": 1575.15, "103": 1596.41, "104": 1620.98, "105": 1644.17, "106": 1663.53, "107": 1721.87, "108": 1741.33, "109": 1754.19, "110": 1771.06, "111": 1792.36, "112": 1800.18, "113": 1784.89, "114": 1782.91, "115": 1787.99, "116": 1787.98, "117": 1787.16, "118": 1785.05, "119": 1769.23, "120": 1801.0, "122": 1776.82, "123": 1785.01, "124": 1783.12, "125": 1782.45, "126": 1774.85, "127": 1762.09, "128": 1752.72, "129": 1741.53, "130": 1728.95, "131": 1714.71, "132": 1699.1, "133": 1686.8, "134": 1672.52, "135": 1662.24, "136": 1653.57, "137": 1640.89, "138": 1629.7, "139": 1617.42, "140": 1778.67, "141": 1772.81, "142": 1754.69, "143": 1729.63, "144": 1702.74, "145": 1680.28, "146": 1653.04, "147": 1636.31, "148": 1618.2, "149": 1598.74, "150": 1577.45, "151": 1539.16, "152": 1517.41, "153": 1481.02, "154": 1456.12, "155": 1777.79, "156": 1766.49, "157": 1750.37, "158": 1726.82, "159": 1711.02, "160": 1697.38, "161": 1678.32, "162": 1759.33, "163": 1752.89, "164": 1744.7, "165": 1737.05, "166": 1726.81, "167": 1713.02, "168": 1705.04, "169": 1701.77, "170": 1695.92, "171": 1687.84, "172": 1680.38, "173": 1675.61, "174": 1669.49, "175": 1665.9, "176": 1661.9, "177": 1658.78, "178": 1654.03, "180": 1756.79, "181": 1762.92, "201": 1884.55, "202": 1903.76, "203": 1915.59, "204": 1947.38, "205": 1966.3, "206": 1967.57, "207": 1973.03, "208": 1983.24, "209": 1979.48, "210": 1990.25, "211": 2019.23, "212": 2027.2, "213": 2039.91, "214": 2046.6, "215": 2070.89, "216": 2075.74, "217": 2086.42, "218": 2110.66, "219": 2117.4, "220": 2124.82, "221": 2122.38, "305": 2077.67, "318": 1850.47, "319": 1842.64, "320": 1823.12, "321": 1809.41, "322": 1785.21, "323": 1752.69, "324": 1727.47, "325": 1708.36, "326": 1683.33, "327": 1663.18, "328": 1638.28, "329": 1613.8, "330": 1588.49, "331": 1573.48, "333": 1551.71, "1002": 1478.87, "1032": 1783.9, "1033": 1796.03, "1047": 1815.98, "1050": 1794.16, "1057": 1795.54, "1092": 1883.14, "1179": 1654.04, "10089": 1499.55 };

        // Composant Surfaces
        AFRAME.registerComponent('kml-polygon', {
            schema: { points: {type: 'string', default: ''}, color: {type: 'color', default: '#3498db'}, opacity: {type: 'number', default: 0.4}, relativeAlt: {type: 'number', default: -1.5} },
            init: function() {
                const pointsArr = this.data.points.trim().split(/\s+/);
                if (pointsArr.length < 3) return;
                const pt0 = pointsArr[0].split(',');
                const lon0 = parseFloat(pt0[0]), lat0 = parseFloat(pt0[1]);
                if(isNaN(lon0) || isNaN(lat0)) return; 
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                for(let i = 1; i < pointsArr.length; i++) {
                    const pt = pointsArr[i].split(',');
                    if (pt.length >= 2) {
                        const lon = parseFloat(pt[0]), lat = parseFloat(pt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        const dist = calculateDistance(lat0, lon0, lat, lon);
                        const bearing = calculateBearing(lat0, lon0, lat, lon);
                        const x = dist * Math.sin(bearing);
                        const z = -dist * Math.cos(bearing); 
                        shape.lineTo(x, z);
                    }
                }
                const geometry = new THREE.ShapeGeometry(shape);
                geometry.rotateX(-Math.PI / 2);
                const material = new THREE.MeshBasicMaterial({ color: this.data.color, transparent: true, opacity: this.data.opacity, side: THREE.DoubleSide, depthWrite: false });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.y = this.data.relativeAlt; 
                this.el.setObject3D('mesh', mesh);
            }
        });

        // --- NOUVEAU BLOC : LE GLISSER-DÉPOSER X/Y (Altitude) ---
        AFRAME.registerComponent('ar-drag-pan', {
            init: function () {
                this.container = document.getElementById('kml-container');
                this.isDragging = false;
                this.lastX = 0;
                this.lastY = 0;

                this.el.addEventListener('mousedown', (evt) => {
                    this.isDragging = true;
                    const mouseEvt = evt.detail.mouseEvent || evt;
                    this.lastX = mouseEvt.clientX || (mouseEvt.touches ? mouseEvt.touches[0].clientX : 0);
                    this.lastY = mouseEvt.clientY || (mouseEvt.touches ? mouseEvt.touches[0].clientY : 0);
                    
                    document.getElementById('status-message').innerText = "Calibrage Manuel en cours...";
                    document.getElementById('status-message').style.color = "#FFCC00";
                });

                window.addEventListener('mouseup', () => { this.isDragging = false; document.getElementById('status-message').style.color = "white"; });
                window.addEventListener('touchend', () => { this.isDragging = false; document.getElementById('status-message').style.color = "white"; });

                window.addEventListener('mousemove', this.onDrag.bind(this));
                window.addEventListener('touchmove', this.onDrag.bind(this), {passive: false});
            },
            onDrag: function (evt) {
                if (!this.isDragging) return;
                evt.preventDefault(); // Bloque le scroll natif d'iOS pendant qu'on manipule la 3D
                
                const currentX = evt.clientX || (evt.touches ? evt.touches[0].clientX : 0);
                const currentY = evt.clientY || (evt.touches ? evt.touches[0].clientY : 0);
                
                const deltaX = currentX - this.lastX;
                const deltaY = currentY - this.lastY;
                
                this.lastX = currentX;
                this.lastY = currentY;

                // Vitesse de déplacement du doigt. 0.05 = 5 centimètres par pixel d'écran glissé.
                const speed = 0.05; 

                const pos = this.container.getAttribute('position');
                this.container.setAttribute('position', {
                    x: pos.x + (deltaX * speed),   // L'axe X contrôle la gauche et la droite
                    y: pos.y - (deltaY * speed),   // L'axe Y contrôle l'ALTITUDE. On soustrait car glisser vers le haut de l'écran = delta négatif
                    z: pos.z                       // L'axe Z (la profondeur) ne bouge plus !
                });
                
                document.getElementById('status-message').innerText = `X: ${pos.x.toFixed(1)}m | Altitude(Y): ${pos.y.toFixed(1)}m`;
            }
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180, phi1 = lat1 * toRad, phi2 = lat2 * toRad, lam1 = lon1 * toRad, lam2 = lon2 * toRad;
            const y = Math.sin(lam2 - lam1) * Math.cos(phi2), x = Math.cos(phi1) * Math.sin(phi2) - Math.sin(phi1) * Math.cos(phi2) * Math.cos(lam2 - lam1);
            return Math.atan2(y, x); 
        }
    </script>
</head>
<body>

    <div id="ui-layer">
        <label for="file-input" class="upload-btn">Charger KML/KMZ</label>
        <input type="file" id="file-input" accept=".kml,.kmz">
    </div>

    <div id="status-message">📍 Autorisez la caméra</div>
    <div id="altitude-debug">Alt. iPhone : Recherche...</div>

    <div id="calibration-panel">
        <div class="cal-btn" id="btn-reset">Reset</div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        <a-camera gps-camera="minDistance: 1; maxDistance: 10000;" rotation-reader></a-camera>
        <a-entity id="kml-container" position="0 0 0"></a-entity>
    </a-scene>

    <script>
        const statusEl = document.getElementById('status-message');
        const altDebugEl = document.getElementById('altitude-debug');
        const containerEl = document.getElementById('kml-container');
        const calibPanel = document.getElementById('calibration-panel');

        let playerLat = null, playerLon = null, playerAlt = 0; 

        // Reset
        document.getElementById('btn-reset').onclick = () => { containerEl.setAttribute('position', {x: 0, y: 0, z: 0}); statusEl.innerText = `Calibrage annulé`; };

        // GPS EN DIRECT
        window.addEventListener('load', () => {
            if (!("geolocation" in navigator)) { statusEl.innerText = "❌ GPS non supporté."; return; }
            navigator.geolocation.watchPosition(
                (pos) => { 
                    playerLat = pos.coords.latitude; playerLon = pos.coords.longitude;
                    if (pos.coords.altitude !== null) {
                        playerAlt = pos.coords.altitude;
                        altDebugEl.innerText = `Alt. iPhone : ${Math.round(playerAlt)} m (±${Math.round(pos.coords.altitudeAccuracy || 0)}m)`;
                    }
                    if(statusEl.innerText.includes("Autorisez")) { statusEl.innerText = `📍 Prêt. Chargez un fichier.`; }
                },
                (e) => { statusEl.style.color = "#ff4d4f"; statusEl.innerText = "❌ ERREUR GPS."; },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        // CHARGEMENT FICHIER
        document.getElementById('file-input').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusEl.innerText = "Analyse Topographique...";
            statusEl.style.color = "white"; 
            
            while (containerEl.firstChild) { containerEl.removeChild(containerEl.firstChild); }
            calibPanel.style.display = "none"; 

            try {
                let kmlText = "";
                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = await JSZip.loadAsync(file);
                    const kmlFilename = Object.keys(zip.files).find(name => name.toLowerCase().endsWith('.kml'));
                    if (!kmlFilename) throw new Error("Aucun KML dans le KMZ.");
                    kmlText = await zip.files[kmlFilename].async("text");
                } else {
                    kmlText = await file.text();
                }
                
                setTimeout(() => {
                    try { processKMLData(kmlText); } 
                    catch(e) { statusEl.style.color = "#ff4d4f"; statusEl.innerText = "🚨 Erreur : " + e.message; }
                }, 100);

            } catch (error) {
                statusEl.style.color = "#ff4d4f"; statusEl.innerText = "🚨 Erreur : " + error.message;
            }
        });

        function getAverageRelativeAltitude(pointsString) {
            const pointsArr = pointsString.trim().split(/\s+/);
            let totalAlt = 0; let count = 0;
            for(let i = 0; i < pointsArr.length; i++) {
                const pt = pointsArr[i].split(',');
                if (pt.length >= 3) {
                    const alt = parseFloat(pt[2]);
                    if (!isNaN(alt)) { totalAlt += alt; count++; }
                }
            }
            if (count > 0) return (totalAlt / count) - playerAlt;
            return 0;
        }

        // GÉNÉRATEUR 3D
        function processKMLData(kmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlString, "text/xml");
            
            let firstLat = null, firstLon = null;
            let stats = { canons: 0, jalons: 0, surfaces: 0 };

            // SURFACES
            const polygons = xmlDoc.getElementsByTagName("Polygon");
            for (let i = 0; i < polygons.length; i++) {
                const coordsTags = polygons[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const text = coordsTags[0].textContent.trim();
                    const firstPt = text.split(/\s+/)[0].split(',');
                    if (firstPt.length >= 2) {
                        const lon = parseFloat(firstPt[0]), lat = parseFloat(firstPt[1]);
                        if(isNaN(lon) || isNaN(lat)) continue; 
                        if (firstLat === null) { firstLat = lat; firstLon = lon; }
                        const relAlt = getAverageRelativeAltitude(text);

                        const surfaceEl = document.createElement('a-entity');
                        surfaceEl.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        surfaceEl.setAttribute('kml-polygon', `points: ${text}; color: #3498db; opacity: 0.5; relativeAlt: ${relAlt}`);
                        containerEl.appendChild(surfaceEl);
                        stats.surfaces++;
                    }
                }
            }

            // TRACES
            const lines = xmlDoc.getElementsByTagName("LineString");
            for (let i = 0; i < lines.length; i++) {
                const coordsTags = lines[i].getElementsByTagName("coordinates");
                if (coordsTags.length > 0) {
                    const points = coordsTags[0].textContent.trim().replace(/\n/g, ' ').split(/\s+/);
                    const step = Math.max(1, Math.floor(points.length / 100)); 
                    
                    for (let j = 0; j < points.length; j += step) {
                        const coords = points[j].split(',');
                        if (coords.length >= 2) {
                            const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                            if(isNaN(lon) || isNaN(lat)) continue; 
                            if (firstLat === null) { firstLat = lat; firstLon = lon; }
                            const relAlt = (coords.length >= 3 && !isNaN(parseFloat(coords[2]))) ? parseFloat(coords[2]) - playerAlt : -1.5;

                            const anchor = document.createElement('a-entity');
                            anchor.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                            const jalon = document.createElement('a-sphere');
                            jalon.setAttribute('position', `0 ${relAlt} 0`);
                            jalon.setAttribute('radius', '1.5'); 
                            jalon.setAttribute('color', '#FF3B30'); 
                            jalon.setAttribute('opacity', '0.7');
                            // Attrapable
                            jalon.setAttribute('class', 'clickable'); 
                            jalon.setAttribute('ar-drag-pan', '');
                            
                            anchor.appendChild(jalon);
                            containerEl.appendChild(anchor);
                            stats.jalons++;
                        }
                    }
                }
            }

            // CANONS
            const placemarks = xmlDoc.getElementsByTagName("Placemark");
            for (let i = 0; i < placemarks.length; i++) {
                const pointNode = placemarks[i].getElementsByTagName("Point")[0];
                if (pointNode) {
                    const coordsTags = pointNode.getElementsByTagName("coordinates");
                    if (coordsTags.length > 0) {
                        const coords = coordsTags[0].textContent.trim().split(',');
                        if (coords.length >= 2) {
                            const lon = parseFloat(coords[0]), lat = parseFloat(coords[1]);
                            if(isNaN(lon) || isNaN(lat)) continue; 
                            if (firstLat === null) { firstLat = lat; firstLon = lon; }

                            const nameNode = placemarks[i].getElementsByTagName("name")[0];
                            const canonId = nameNode ? nameNode.textContent.trim() : null;

                            let vraieAltitude = null; let sourceAlt = "0m";
                            if (canonId && baseAltitudesCanons[canonId]) {
                                vraieAltitude = baseAltitudesCanons[canonId];
                                sourceAlt = vraieAltitude + "m";
                            } else if (coords.length >= 3 && !isNaN(parseFloat(coords[2]))) {
                                vraieAltitude = parseFloat(coords[2]);
                                sourceAlt = vraieAltitude + "m";
                            }

                            let relAlt = vraieAltitude !== null ? vraieAltitude - playerAlt : -1.5;
                            stats.canons++;

                            const pointGroup = document.createElement('a-entity');
                            pointGroup.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);

                            const heightContainer = document.createElement('a-entity');
                            heightContainer.setAttribute('position', `0 ${relAlt} 0`);

                            const sphere = document.createElement('a-sphere');
                            sphere.setAttribute('radius', '3.5');
                            sphere.setAttribute('color', '#FFCC00'); 
                            // Attrapable
                            sphere.setAttribute('class', 'clickable');
                            sphere.setAttribute('ar-drag-pan', '');
                            heightContainer.appendChild(sphere);

                            const etiquette = document.createElement('a-text');
                            const nomAffichage = canonId ? canonId : `Inc_${stats.canons}`;
                            const texteAffiche = `C-${nomAffichage}\nAlt: ${sourceAlt}\nDif: ${Math.round(relAlt)}m`;
                            
                            etiquette.setAttribute('value', texteAffiche);
                            etiquette.setAttribute('look-at', '[gps-camera]'); 
                            etiquette.setAttribute('scale', '10 10 10'); 
                            etiquette.setAttribute('position', '0 6 0'); 
                            etiquette.setAttribute('align', 'center');
                            etiquette.setAttribute('color', '#FFFFFF');
                            etiquette.setAttribute('geometry', 'primitive: plane; height: auto; width: auto');
                            etiquette.setAttribute('material', 'color: #000000; opacity: 0.7');
                            
                            heightContainer.appendChild(etiquette);
                            pointGroup.appendChild(heightContainer);
                            containerEl.appendChild(pointGroup); 
                        }
                    }
                }
            }

            if (firstLat !== null && playerLat !== null) {
                statusEl.innerText = `${stats.canons} Canons. Touchez et glissez un point !`;
                calibPanel.style.display = "block"; 
            }
        }
    </script>
</body>
