<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur Topographique KML / MNT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; font-family: -apple-system, sans-serif; }
        
        #sidebar { width: 350px; background: #2c3e50; color: white; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; z-index: 1000; box-shadow: 2px 0 5px rgba(0,0,0,0.5); }
        #map { flex-grow: 1; height: 100%; background: #000; cursor: crosshair; }
        
        h2 { margin-top: 0; font-size: 18px; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .file-box { background: #34495e; padding: 15px; border-radius: 8px; border: 1px dashed #7f8c8d; transition: 0.3s; }
        .file-box.active { border-color: #4ade80; background: #27ae60; }
        .file-box label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; cursor: pointer;}
        input[type="file"] { width: 100%; color: #bdc3c7; font-size: 12px; }
        
        #log-panel { background: #1a252f; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; color: #4ade80; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.4;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Atelier Topographique</h2>
        
        <div class="file-box" id="box-kmz">
            <label for="kmz-input">1. Charger la trace (KML/KMZ)</label>
            <input type="file" id="kmz-input" accept=".kml,.kmz">
        </div>
        
        <div class="file-box" id="box-tif">
            <label for="tif-input">2. Charger le MNT (.tif)</label>
            <input type="file" id="tif-input" accept=".tif,.tiff">
            <div style="font-size: 11px; margin-top:5px;">(Format requis : EPSG:4326 / WGS84)</div>
        </div>

        <div id="log-panel">Prêt. En attente de fichiers...</div>
    </div>

    <div id="map"></div>

    <script>
        const logPanel = document.getElementById('log-panel');
        function log(msg) { logPanel.innerText += `\n> ${msg}`; logPanel.scrollTop = logPanel.scrollHeight; }

        const map = L.map('map').setView([42.79, 0.59], 13); // Centré vers les Pyrénées par défaut
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri' }).addTo(map);

        const kmlLayerGroup = L.featureGroup().addTo(map);
        let mntBoundsLayer = null; // Pour afficher le contour du TIF

        // --- VARIABLES GLOBALES DU MNT ---
        let mntData = null; // Les altitudes pures
        let mntWidth = 0;
        let mntHeight = 0;
        let mntBbox = null; // [minLon, minLat, maxLon, maxLat]

        // --- BLOC 2 : LECTURE DU MNT (.tif) ---
        document.getElementById('tif-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            log(`Analyse du MNT : ${file.name}...`);
            document.getElementById('box-tif').classList.add('active');

            try {
                // Lecture du fichier via GeoTIFF.js
                const arrayBuffer = await file.arrayBuffer();
                const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                const image = await tiff.getImage();
                
                mntBbox = image.getBoundingBox();
                mntWidth = image.getWidth();
                mntHeight = image.getHeight();
                
                log(`Dimensions : ${mntWidth} x ${mntHeight} pixels`);
                log(`Emprise (Bbox) : Long [${mntBbox[0].toFixed(3)}, ${mntBbox[2].toFixed(3)}], Lat [${mntBbox[1].toFixed(3)}, ${mntBbox[3].toFixed(3)}]`);

                // Extraction des données d'altitude (Bande 1)
                const rasters = await image.readRasters();
                mntData = rasters[0]; 

                log(`✅ MNT chargé en mémoire. Cliquez sur la carte pour tester l'altitude !`);

                // Dessin de l'emprise du TIF sur la carte (Rectangle rouge translucide)
                if (mntBoundsLayer) map.removeLayer(mntBoundsLayer);
                const bounds = [[mntBbox[1], mntBbox[0]], [mntBbox[3], mntBbox[2]]];
                mntBoundsLayer = L.rectangle(bounds, {color: "#ff4d4f", weight: 2, fillOpacity: 0.1, dashArray: '5, 5'}).addTo(map);
                
                // On recentre la caméra sur le MNT
                map.fitBounds(bounds, { padding: [20, 20] });

            } catch (error) {
                log(`❌ ERREUR MNT: ${error.message}`);
                document.getElementById('box-tif').classList.remove('active');
            }
        });

            if (lon < minLon || lon > maxLon || lat < minLat || lat > maxLat) return null;
